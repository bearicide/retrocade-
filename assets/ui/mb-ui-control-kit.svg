<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="MATTBEAR Retrocade universal arcade control kit">
  <defs>
    <filter id="glowCyan" x="-40%" y="-60%" width="180%" height="220%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowPink" x="-40%" y="-60%" width="180%" height="220%"><feGaussianBlur stdDeviation="8" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 .7 0 0 0 0 .1 0 0 1 0 .8 0 0 0 1 0"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="5" flood-color="#000" flood-opacity=".7"/></filter>
    <linearGradient id="greenFace" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#b6ff8c"/><stop offset=".22" stop-color="#33ff55"/><stop offset=".6" stop-color="#089c32"/><stop offset="1" stop-color="#003d1f"/></linearGradient>
    <linearGradient id="redFace" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fff0a0"/><stop offset=".2" stop-color="#ff5a25"/><stop offset=".65" stop-color="#b00000"/><stop offset="1" stop-color="#3b0000"/></linearGradient>
    <linearGradient id="blueFace" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#bff8ff"/><stop offset=".25" stop-color="#26b7ff"/><stop offset=".68" stop-color="#003b9e"/><stop offset="1" stop-color="#001333"/></linearGradient>
    <linearGradient id="yellowFace" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fffbd0"/><stop offset=".28" stop-color="#ffe64d"/><stop offset=".7" stop-color="#d88a00"/><stop offset="1" stop-color="#4d2700"/></linearGradient>
    <linearGradient id="metal" x1="0" x2="1"><stop offset="0" stop-color="#050509"/><stop offset=".18" stop-color="#3d4350"/><stop offset=".5" stop-color="#10131a"/><stop offset=".82" stop-color="#59606d"/><stop offset="1" stop-color="#050509"/></linearGradient>
    <style>
      .label{font-family:Arial Black,Impact,sans-serif;font-weight:900;letter-spacing:2px;paint-order:stroke;stroke:#140006;stroke-width:6px;fill:#fff6b8;text-anchor:middle;dominant-baseline:middle}
      .small{font-size:32px}.med{font-size:46px}.big{font-size:64px}.face{stroke:#061015;stroke-width:5}.rim{fill:none;stroke-width:9}.shine{fill:rgba(255,255,255,.32)}
    </style>
    <symbol id="round-green" viewBox="0 0 240 160"><ellipse cx="120" cy="80" rx="104" ry="62" fill="url(#metal)" filter="url(#shadow)"/><ellipse cx="120" cy="70" rx="92" ry="54" fill="url(#greenFace)" class="face" filter="url(#glowCyan)"/><ellipse cx="120" cy="44" rx="66" ry="14" class="shine"/></symbol>
    <symbol id="round-red" viewBox="0 0 240 160"><ellipse cx="120" cy="80" rx="104" ry="62" fill="url(#metal)" filter="url(#shadow)"/><ellipse cx="120" cy="70" rx="92" ry="54" fill="url(#redFace)" class="face" filter="url(#glowPink)"/><ellipse cx="120" cy="44" rx="66" ry="14" class="shine"/></symbol>
    <symbol id="round-yellow" viewBox="0 0 240 160"><ellipse cx="120" cy="80" rx="104" ry="62" fill="url(#metal)" filter="url(#shadow)"/><ellipse cx="120" cy="70" rx="92" ry="54" fill="url(#yellowFace)" class="face" filter="url(#glowPink)"/><ellipse cx="120" cy="44" rx="66" ry="14" class="shine"/></symbol>
    <symbol id="wide-red" viewBox="0 0 360 130"><rect x="16" y="26" width="328" height="78" rx="23" fill="url(#metal)" filter="url(#shadow)"/><rect x="28" y="18" width="304" height="74" rx="18" fill="url(#redFace)" class="face" filter="url(#glowPink)"/><rect x="48" y="29" width="264" height="18" rx="9" class="shine"/></symbol>
    <symbol id="wide-blue" viewBox="0 0 360 130"><rect x="16" y="26" width="328" height="78" rx="23" fill="url(#metal)" filter="url(#shadow)"/><rect x="28" y="18" width="304" height="74" rx="18" fill="url(#blueFace)" class="face" filter="url(#glowCyan)"/><rect x="48" y="29" width="264" height="18" rx="9" class="shine"/></symbol>
    <symbol id="wide-green" viewBox="0 0 360 130"><rect x="16" y="26" width="328" height="78" rx="23" fill="url(#metal)" filter="url(#shadow)"/><rect x="28" y="18" width="304" height="74" rx="18" fill="url(#greenFace)" class="face" filter="url(#glowCyan)"/><rect x="48" y="29" width="264" height="18" rx="9" class="shine"/></symbol>
    <symbol id="dpad" viewBox="0 0 230 230"><path d="M82 12h66v70h70v66h-70v70H82v-70H12V82h70z" fill="url(#metal)" stroke="#9da5b5" stroke-width="6" filter="url(#shadow)"/><path d="M115 36l23 33H92zM115 194l-23-33h46zM36 115l33-23v46zM194 115l-33 23V92z" fill="#f2f5ff"/><circle cx="115" cy="115" r="26" fill="#10131a" stroke="#00ffcc" stroke-width="4" opacity=".78"/></symbol>
  </defs>
  <rect width="1200" height="900" fill="#050507"/>
  <use href="#round-green" x="40" y="40" width="240" height="160"/><text x="160" y="110" class="label big">SPIN</text>
  <use href="#wide-red" x="330" y="52" width="360" height="130"/><text x="510" y="114" class="label big">START</text>
  <use href="#wide-blue" x="750" y="52" width="360" height="130"/><text x="930" y="114" class="label med">AUTO PLAY</text>
  <use href="#wide-green" x="40" y="240" width="360" height="130"/><text x="220" y="302" class="label med">PRIMARY</text>
  <use href="#wide-blue" x="430" y="240" width="360" height="130"/><text x="610" y="302" class="label med">MENU</text>
  <use href="#wide-red" x="820" y="240" width="360" height="130"/><text x="1000" y="302" class="label med">DANGER</text>
  <use href="#dpad" x="60" y="430" width="220" height="220"/>
  <use href="#round-yellow" x="340" y="450" width="240" height="160"/><text x="460" y="520" class="label med">BACK</text>
  <use href="#round-red" x="610" y="450" width="240" height="160"/><text x="730" y="520" class="label med">RESET</text>
  <use href="#round-green" x="880" y="450" width="240" height="160"/><text x="1000" y="520" class="label med">GO</text>
  <rect x="60" y="700" width="500" height="130" rx="28" fill="url(#metal)" stroke="#00ffcc" stroke-width="5" filter="url(#shadow)"/>
  <text x="310" y="740" class="label small">OPERATOR PANEL</text>
  <rect x="110" y="775" width="300" height="16" rx="8" fill="#061015" stroke="#00ffcc" stroke-width="3"/><circle cx="315" cy="783" r="24" fill="url(#blueFace)" stroke="#eaffff" stroke-width="3" filter="url(#glowCyan)"/>
  <rect x="700" y="705" width="400" height="115" rx="26" fill="url(#metal)" stroke="#ffe66d" stroke-width="5" filter="url(#shadow)"/>
  <rect x="735" y="735" width="145" height="54" rx="14" fill="url(#greenFace)" stroke="#eaffff" stroke-width="3" filter="url(#glowCyan)"/><text x="807" y="763" class="label small">ON</text>
  <rect x="915" y="735" width="145" height="54" rx="14" fill="url(#redFace)" stroke="#fff6b8" stroke-width="3" filter="url(#glowPink)"/><text x="987" y="763" class="label small">OFF</text>
</svg>
