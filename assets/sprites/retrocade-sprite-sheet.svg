      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cyanPink" x1="0" x2="1"><stop stop-color="#00ffcc"/><stop offset="1" stop-color="#ff2bd6"/></linearGradient>
    <linearGradient id="goldGreen" x1="0" x2="1"><stop stop-color="#ffe66d"/><stop offset="1" stop-color="#7cff6b"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="#050507"/>
