<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Snake - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='640' height='640'></canvas><div class='controls'><button onclick='startGame()'>RESTART</button></div><p class='note'>Arrow keys, WASD, or touch pad. Eat pixels. Don't eat yourself. Ancient rules.</p></div><div class='touch-controls'><div class='touch-pad-label'>SNAKE TOUCH CONTROLS</div><div><button class='touch-btn' data-dir='up'>▲</button></div><div><button class='touch-btn' data-dir='left'>◀</button><button class='touch-btn wide' onclick='startGame()'>RESET</button><button class='touch-btn' data-dir='right'>▶</button></div><div><button class='touch-btn' data-dir='down'>▼</button></div></div><script>retroHeader('SNAKE');const c=document.getElementById('game');const x=c.getContext('2d');let snake=[{x:10,y:10}],dir={x:1,y:0},next={x:1,y:0},food={x:15,y:15},size=32,run;function spawn(){food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)}}function draw(){x.fillStyle='#050507';x.fillRect(0,0,640,640);x.fillStyle='#00ffcc';snake.forEach(p=>x.fillRect(p.x*size,p.y*size,size-3,size-3));x.fillStyle='#ff2bd6';x.fillRect(food.x*size,food.y*size,size-3,size-3)}function setDir(name){const m={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};const nd=m[name];if(!nd)return;if(nd.x+dir.x!==0||nd.y+dir.y!==0)next=nd}function step(){dir=next;const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.y<0||h.x>19||h.y>19||snake.some(p=>p.x===h.x&&p.y===h.y)){clearInterval(run);retroToast('GAME OVER - hit reset');return}snake.unshift(h);if(h.x===food.x&&h.y===food.y){retroWin(5,10,1,'snake');spawn()}else snake.pop();draw()}function startGame(){snake=[{x:10,y:10}];dir={x:1,y:0};next=dir;spawn();draw();clearInterval(run);run=setInterval(step,120)}document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w')setDir('up');if(e.key==='ArrowDown'||e.key==='s')setDir('down');if(e.key==='ArrowLeft'||e.key==='a')setDir('left');if(e.key==='ArrowRight'||e.key==='d')setDir('right')});document.querySelectorAll('[data-dir]').forEach(b=>b.addEventListener('pointerdown',()=>setDir(b.dataset.dir)));startGame();</script></body></html>
