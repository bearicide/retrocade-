<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Snake - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='640' height='640'></canvas><div class='controls'><button onclick='startGame()'>RESTART</button></div><p class='note'>Eat pixels. Don't eat yourself. Ancient rules.</p></div><script>retroHeader('SNAKE');const c=document.getElementById('game');const x=c.getContext('2d');let snake=[{x:10,y:10}],dir={x:1,y:0},food={x:15,y:15},size=32,run;function spawn(){food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)}}function draw(){x.fillStyle='#050507';x.fillRect(0,0,640,640);x.fillStyle='#00ffcc';snake.forEach(p=>x.fillRect(p.x*size,p.y*size,size-3,size-3));x.fillStyle='#ff2bd6';x.fillRect(food.x*size,food.y*size,size-3,size-3)}function step(){const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.y<0||h.x>19||h.y>19||snake.some(p=>p.x===h.x&&p.y===h.y)){clearInterval(run);alert('GAME OVER');return}snake.unshift(h);if(h.x===food.x&&h.y===food.y){retroWin(5,10,1);spawn()}else snake.pop();draw()}function startGame(){snake=[{x:10,y:10}];dir={x:1,y:0};spawn();draw();clearInterval(run);run=setInterval(step,120)}document.addEventListener('keydown',e=>{if(e.key==='ArrowUp')dir={x:0,y:-1};if(e.key==='ArrowDown')dir={x:0,y:1};if(e.key==='ArrowLeft')dir={x:-1,y:0};if(e.key==='ArrowRight')dir={x:1,y:0}});startGame();</script></body></html>
