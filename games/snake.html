<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Snake - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='640' height='640'></canvas><div class='controls'><button onclick='startGame()'>RESTART</button></div><p class='note'>Arrow keys, WASD, or touch pad. Eat pixels. Don't eat yourself. Ancient rules.</p></div><div class='touch-controls'><div class='touch-pad-label'>SNAKE TOUCH CONTROLS</div><div><button class='touch-btn' data-dir='up'>▲</button></div><div><button class='touch-btn' data-dir='left'>◀</button><button class='touch-btn wide' onclick='startGame()'>RESET</button><button class='touch-btn' data-dir='right'>▶</button></div><div><button class='touch-btn' data-dir='down'>▼</button></div></div><script>retroHeader('SNAKE');const c=document.getElementById('game');const x=c.getContext('2d');let snake=[{x:10,y:10}],dir={x:1,y:0},next={x:1,y:0},food={x:15,y:15},size=32,run,stars=[];for(let i=0;i<70;i++)stars.push({x:Math.random()*640,y:Math.random()*640,s:Math.random()*2+.5});function spawn(){food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)}}function bg(){x.fillStyle='#050507';x.fillRect(0,0,640,640);stars.forEach(s=>{x.fillStyle='rgba(255,255,255,.18)';x.fillRect(s.x,s.y,s.s,s.s)});for(let gy=0;gy<20;gy++)for(let gx=0;gx<20;gx++){x.strokeStyle='rgba(0,255,204,.06)';x.strokeRect(gx*32,gy*32,32,32)}}function drawSnake(){snake.forEach((p,i)=>{const px=p.x*size,py=p.y*size;const glow=x.createRadialGradient(px+16,py+16,2,px+16,py+16,22);glow.addColorStop(0,'#7cff6b');glow.addColorStop(1,'#00ffcc');x.fillStyle=glow;x.fillRect(px+2,py+2,size-4,size-4);if(i===0){x.fillStyle='#050507';x.beginPath();x.arc(px+10,py+12,3,0,7);x.arc(px+22,py+12,3,0,7);x.fill()}})}function drawFood(){const px=food.x*size,py=food.y*size;x.shadowBlur=22;x.shadowColor='#ff2bd6';x.fillStyle='#ff2bd6';x.beginPath();x.arc(px+16,py+16,11,0,7);x.fill();x.shadowBlur=0;x.fillStyle='#ffe66d';x.beginPath();x.arc(px+12,py+11,4,0,7);x.fill()}function draw(){bg();drawSnake();drawFood();x.fillStyle='#ffe66d';x.font='bold 20px Arial';x.fillText('LENGTH '+snake.length,18,28)}function setDir(name){const m={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};const nd=m[name];if(!nd)return;if(nd.x+dir.x!==0||nd.y+dir.y!==0)next=nd}function burst(px,py){for(let i=0;i<10;i++){x.fillStyle=['#00ffcc','#7cff6b','#ffe66d','#ff2bd6'][i%4];x.fillRect(px+Math.random()*22,py+Math.random()*22,4,4)}}function step(){dir=next;const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.y<0||h.x>19||h.y>19||snake.some(p=>p.x===h.x&&p.y===h.y)){clearInterval(run);retroToast('GAME OVER - hit reset');return}snake.unshift(h);if(h.x===food.x&&h.y===food.y){burst(food.x*32,food.y*32);retroWin(5,10,1,'snake');spawn()}else snake.pop();draw()}function startGame(){snake=[{x:10,y:10}];dir={x:1,y:0};next=dir;spawn();draw();clearInterval(run);run=setInterval(step,120)}document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w')setDir('up');if(e.key==='ArrowDown'||e.key==='s')setDir('down');if(e.key==='ArrowLeft'||e.key==='a')setDir('left');if(e.key==='ArrowRight'||e.key==='d')setDir('right')});document.querySelectorAll('[data-dir]').forEach(b=>b.addEventListener('pointerdown',()=>setDir(b.dataset.dir)));startGame();</script></body></html>
