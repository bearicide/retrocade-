<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Invaders - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='800' height='560'></canvas><div class='controls'><button id='startBtn'>START WAVE</button><button id='pauseBtn'>PAUSE</button><button id='resetBtn'>RESET RUN</button></div><p class='note'>Keyboard, WASD, touch deck, drag, dodge, fire, reset, boss waves, readable overlays, and cleaner wave pacing.</p></div><div class='touch-controls'><div class='touch-pad-label'>INVADERS CONTROL DECK</div><div class='dpad'><button class='touch-btn left' id='leftBtn'>◀</button><button class='touch-btn center primary' id='fireBtn'>FIRE</button><button class='touch-btn right' id='rightBtn'>▶</button></div><div class='actions'><button class='touch-btn wide primary' id='touchStart'>START</button><button class='touch-btn wide' id='touchPause'>PAUSE</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('INVADERS');const c=document.getElementById('game'),g=c.getContext('2d');let px,vx,shots,enemyShots,enemies,particles,stars,dir,score,wave,lives,combo,move,fireLock,paused,running,lastEnemyShot,lastDive,shake,boss,gameOver,lastTouch=null;function resetRun(){px=380;vx=0;shots=[];enemyShots=[];enemies=[];particles=[];stars=[];dir=1;score=0;wave=1;lives=3;combo=0;move=0;fireLock=false;paused=false;running=false;lastEnemyShot=0;lastDive=0;shake=0;boss=null;gameOver=false;for(let i=0;i<90;i++)stars.push({x:Math.random()*800,y:Math.random()*560,s:Math.random()*2+.4,v:Math.random()*.6+.2});buildWave();RetroState.show('READY','START THE DEFENSE','retro-ready',900)}function buildWave(){enemies=[];shots=[];enemyShots=[];particles=[];dir=1;boss=null;const rows=4+Math.min(2,wave-1);for(let y=0;y<rows;y++)for(let x=0;x<9;x++)enemies.push({x:70+x*70,y:58+y*38,hp:y>3?2:1,phase:Math.random()*9,dive:false,vy:0,type:y>3?'brute':'grunt'});if(wave%3===0)boss={x:330,y:32,w:130,h:28,hp:8+wave*2,max:8+wave*2,vx:1.4};RetroState.show('WAVE '+wave,'DEFEND THE SIGNAL','retro-ready',900)}function startGame(){if(gameOver)resetRun();running=true;paused=false;RetroState.show('GO','KEEP FIRING','retro-ready',650)}function nextWave(){wave++;retroWin(45+wave*5,85+wave*10,5,'invaders');buildWave()}function togglePause(){if(!running||gameOver)return;paused=!paused;RetroState.show(paused?'PAUSED':'GO',paused?'PRESS START':'KEEP FIRING','',650)}function shoot(){if(!running||paused||fireLock||gameOver)return;shots.push({x:px+29,y:492,vy:-12,power:1});fireLock=true;setTimeout(()=>fireLock=false,125);if(window.RetroAudio)RetroAudio.confirm()}function pop(x,y,color,count){for(let i=0;i<(count||12);i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:18+Math.random()*24,color:color||'#ffe66d'})}function hitPlayer(){if(gameOver)return;lives--;shake=14;combo=0;pop(px+30,510,'#ff4444',24);if(window.RetroPass3)RetroPass3.danger();if(lives<=0){running=false;gameOver=true;RetroState.show('GAME OVER','RESET TO DEFEND AGAIN','danger',1800);retroWin(0,5,0,'invaders')}else RetroState.show('HIT','LIVES '+lives,'danger',700)}function enemyFire(now){const chance=760-Math.min(430,wave*42)-Math.min(160,(36-enemies.length)*6);if(now-lastEnemyShot<chance||enemies.length===0)return;lastEnemyShot=now;const en=enemies[Math.floor(Math.random()*enemies.length)];enemyShots.push({x:en.x+18,y:en.y+24,vy:4.1+wave*.24,wob:Math.random()*6});if(window.RetroAudio)RetroAudio.click()}function enemyDive(now){if(now-lastDive<1900-Math.min(850,wave*80)||enemies.length<5)return;lastDive=now;const en=enemies[Math.floor(Math.random()*enemies.length)];en.dive=true;en.vy=2.1+wave*.18;RetroState.show('DIVE','MOVE','danger',450)}function update(){if(!running||paused||gameOver)return;const now=performance.now();vx+=move*1.55;vx*=.82;px=Math.max(10,Math.min(730,px+vx));shots.forEach(s=>s.y+=s.vy);enemyShots.forEach(s=>{s.y+=s.vy;s.x+=Math.sin(s.y*.04+s.wob)*.8});shots=shots.filter(s=>s.y>-30);enemyShots=enemyShots.filter(s=>s.y<590);let speed=.40+(wave*.068)+Math.max(0,(20-enemies.length)*.033);let edge=false;enemies.forEach(en=>{en.phase+=.08;if(en.dive){en.y+=en.vy;en.x+=Math.sin(en.phase)*2.7;if(en.y>492){hitPlayer();en.dive=false;en.y=80+Math.random()*90}}else{en.x+=dir*speed;if(en.x>748||en.x<18)edge=true}});if(edge){dir*=-1;enemies.forEach(e=>e.y+=18);shake=5}enemyFire(now);enemyDive(now);if(boss){boss.x+=boss.vx;if(boss.x<50||boss.x>620)boss.vx*=-1;if(Math.random()<.01+wave*.002)enemyShots.push({x:boss.x+boss.w/2,y:boss.y+boss.h,vy:5.5,wob:Math.random()*6})}shots.forEach(s=>{enemies.forEach(en=>{if(!en.dead&&s.x>en.x&&s.x<en.x+38&&s.y>en.y&&s.y<en.y+28){s.dead=true;en.hp--;shake=4;pop(en.x+18,en.y+14,en.hp>0?'#ffe66d':'#ff2bd6',en.hp>0?7:15);if(en.hp<=0){en.dead=true;score+=10+combo*3;combo++;retroWin(2,4,0,'invaders');if(combo%6===0)RetroState.show('COMBO',combo+' CHAIN','bigwin',520);if(window.RetroPass3)RetroPass3.combo(combo)}}});if(boss&&s.x>boss.x&&s.x<boss.x+boss.w&&s.y>boss.y&&s.y<boss.y+boss.h){s.dead=true;boss.hp--;shake=5;pop(s.x,s.y,'#00ffcc',8);if(boss.hp<=0){score+=250;pop(boss.x+60,boss.y+16,'#ffe66d',45);RetroState.show('BOSS DOWN','SIGNAL CLEAR','bigwin',900);boss=null}}});shots=shots.filter(s=>!s.dead);enemies=enemies.filter(e=>!e.dead);enemyShots.forEach(s=>{if(s.x>px&&s.x<px+60&&s.y>496&&s.y<534){s.dead=true;hitPlayer()}});enemyShots=enemyShots.filter(s=>!s.dead);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--});particles=particles.filter(p=>p.life>0);if(enemies.some(e=>e.y>450)){RetroState.show('BREACH','THEY ARE TOO LOW','danger',700);shake=10}if(enemies.length===0&&!boss)nextWave()}function draw(){let ox=0,oy=0;if(shake>0){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake;shake*=.86}g.save();g.translate(ox,oy);g.fillStyle='#050507';g.fillRect(-20,-20,840,600);stars.forEach(s=>{s.y+=s.v;if(s.y>560)s.y=0;g.fillStyle='rgba(255,255,255,.2)';g.fillRect(s.x,s.y,s.s,s.s)});g.fillStyle='#00ffcc';g.shadowColor='#00ffcc';g.shadowBlur=18;g.fillRect(px,510,60,16);g.fillRect(px+20,496,20,14);g.shadowBlur=0;shots.forEach(s=>{g.fillStyle='#ffe66d';g.fillRect(s.x,s.y,5,16)});enemyShots.forEach(s=>{g.fillStyle='#ff4444';g.fillRect(s.x,s.y,6,16)});enemies.forEach(en=>{g.fillStyle=en.type==='brute'?'#ffe66d':'#ff2bd6';g.shadowColor=g.fillStyle;g.shadowBlur=12;g.fillRect(en.x,en.y,38,25);g.fillStyle='#050507';g.fillRect(en.x+8,en.y+8,6,5);g.fillRect(en.x+24,en.y+8,6,5);g.shadowBlur=0});if(boss){g.fillStyle='#7cff6b';g.shadowColor='#7cff6b';g.shadowBlur=20;g.fillRect(boss.x,boss.y,boss.w,boss.h);g.shadowBlur=0;g.fillStyle='#050507';g.fillRect(boss.x+12,boss.y+8,boss.w-24,5);g.fillStyle='#ff2bd6';g.fillRect(boss.x+12,boss.y+8,(boss.w-24)*(boss.hp/boss.max),5)}particles.forEach(p=>{g.globalAlpha=Math.max(0,p.life/30);g.fillStyle=p.color;g.fillRect(p.x,p.y,4,4);g.globalAlpha=1});g.fillStyle='#ffe66d';g.font='bold 20px Arial';g.fillText('SCORE '+score,20,30);g.fillText('WAVE '+wave,350,30);g.fillText('LIVES '+lives,680,30);if(!running&&!gameOver){g.font='bold 46px Arial';g.fillText('PRESS START',250,290)}if(paused){g.fillStyle='rgba(0,0,0,.56)';g.fillRect(0,0,800,560);g.fillStyle='#ffe66d';g.font='bold 54px Arial';g.fillText('PAUSED',285,290)}if(gameOver){g.fillStyle='rgba(0,0,0,.58)';g.fillRect(0,0,800,560);g.fillStyle='#ff2bd6';g.font='bold 54px Arial';g.fillText('GAME OVER',245,290)}g.restore();requestAnimationFrame(loop)}function loop(){update();draw()}function setMove(v){move=v}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(leftBtn,()=>setMove(-1),()=>setMove(0));bindHold(rightBtn,()=>setMove(1),()=>setMove(0));fireBtn.onpointerdown=shoot;startBtn.onclick=touchStart.onclick=startGame;pauseBtn.onclick=touchPause.onclick=togglePause;resetBtn.onclick=touchReset.onclick=resetRun;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')move=-1;if(e.key==='ArrowRight'||e.key==='d')move=1;if(e.key===' '||e.key==='Enter')shoot();if(e.key==='p')togglePause();if(e.key==='r')resetRun()});document.addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))move=0});c.addEventListener('pointermove',e=>{const r=c.getBoundingClientRect();px=((e.clientX-r.left)/r.width)*800-30;px=Math.max(10,Math.min(730,px))});c.addEventListener('pointerdown',e=>{if(!running&&!gameOver)startGame();else shoot();lastTouch={x:e.clientX,y:e.clientY}});c.addEventListener('pointerup',e=>{if(!lastTouch)return;const dx=e.clientX-lastTouch.x;if(dx>24)setMove(1);if(dx<-24)setMove(-1);setTimeout(()=>setMove(0),100);lastTouch=null});resetRun();loop();</script></body></html>
