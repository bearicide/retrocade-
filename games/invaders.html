<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Invaders - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='800' height='560'></canvas><p class='note'>Tiny aliens. Large emotional stakes.</p></div><script>retroHeader('INVADERS');const c=document.getElementById('game'),g=c.getContext('2d');let px=380,shots=[],enemies=[],dir=1,score=0;for(let y=0;y<4;y++)for(let x=0;x<9;x++)enemies.push({x:70+x*70,y:60+y*50,a:1});document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')px-=28;if(e.key==='ArrowRight')px+=28;if(e.key===' ')shots.push({x:px+20,y:490})});function loop(){g.fillStyle='#050507';g.fillRect(0,0,800,560);g.fillStyle='#00ffcc';g.fillRect(px,510,60,16);shots.forEach(s=>{s.y-=8;g.fillRect(s.x,s.y,4,12)});let edge=false;enemies.forEach(en=>{en.x+=dir*.25;if(en.x>740||en.x<20)edge=true;g.fillStyle='#ff2bd6';g.fillRect(en.x,en.y,36,24)});if(edge){dir*=-1;enemies.forEach(e=>e.y+=18)}shots=shots.filter(s=>s.y>-20);enemies=enemies.filter(en=>{let hit=shots.some(s=>s.x>en.x&&s.x<en.x+36&&s.y>en.y&&s.y<en.y+24);if(hit){retroWin(2,3,0);score++;return false}return true});g.fillStyle='#ffe66d';g.font='20px Arial';g.fillText('Score '+score,20,30);if(enemies.length===0){retroWin(50,100,10);alert('WAVE CLEARED')}requestAnimationFrame(loop)}loop();</script></body></html>
