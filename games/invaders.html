<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#08111f"><title>Invaders | RETROCADE</title><style>:root{--ink:#f8fbff;--muted:#a9b8ca;--line:rgba(255,255,255,.13);--panel:rgba(11,25,44,.9);--cyan:#42ddff;--lime:#9aff6a;--pink:#ff74bd;--gold:#ffd166;--danger:#ff667d;--shadow:0 26px 80px rgba(0,0,0,.4)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 12% 5%,rgba(66,221,255,.18),transparent 28rem),radial-gradient(circle at 88% 10%,rgba(154,255,106,.12),transparent 26rem),linear-gradient(180deg,#0b1a31,#050a12 72%);color:var(--ink)}body{padding:10px;overflow-x:hidden}.app{width:min(1080px,100%);margin:auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.back{color:var(--ink);text-decoration:none;font-weight:900}.pill{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.05);color:var(--muted);font-size:.8rem;font-weight:850}.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:10px;margin-bottom:10px}.hero-copy,.stats,.game-shell{border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow)}.hero-copy{padding:20px;border-radius:24px}.eyebrow{color:var(--lime);font-size:.74rem;font-weight:950;letter-spacing:.13em;text-transform:uppercase}.hero h1{margin:7px 0 4px;font-size:clamp(2.8rem,9vw,5.6rem);line-height:.9;letter-spacing:-.055em}.hero p{margin:0;color:var(--muted);line-height:1.42}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px;border-radius:24px}.stat{min-height:78px;padding:11px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.045);display:flex;flex-direction:column;justify-content:space-between}.stat span{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:900}.stat strong{font-size:1.8rem}.game-shell{border-radius:24px;padding:10px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.status strong{display:block}.status span{display:block;color:var(--muted);font-size:.84rem;margin-top:2px}.buttons{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);border-radius:14px;padding:11px 14px;background:rgba(255,255,255,.08);color:var(--ink);font-weight:900;cursor:pointer;min-height:48px}.btn.primary{background:linear-gradient(135deg,var(--lime),var(--cyan));color:#06131c;border:0}.stage{display:grid;grid-template-columns:minmax(0,1fr) 235px;gap:10px}.canvas-wrap{position:relative;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#04101b}.canvas-wrap canvas{display:block;width:100%;height:auto;aspect-ratio:4/3;touch-action:none}.guide{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);padding:13px 18px;border-radius:999px;background:rgba(3,11,19,.88);border:1px solid var(--line);font-weight:950;white-space:nowrap;transition:.45s;pointer-events:none}.guide.hide{opacity:0;transform:translate(-50%,-42%)}.side{display:grid;gap:10px}.panel{border:1px solid var(--line);border-radius:17px;padding:12px;background:rgba(255,255,255,.045)}.panel strong{display:block;margin-bottom:6px}.panel p{margin:0;color:var(--muted);font-size:.86rem;line-height:1.4}.move-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}.big{min-height:68px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.08);color:var(--ink);font-size:1.5rem;font-weight:950}.fire{width:100%;min-height:72px;font-size:1.2rem}.eye.active{outline:3px solid var(--gold);outline-offset:2px}.eye-target{position:relative}.eye-target.dwelling{box-shadow:0 0 0 4px var(--gold) inset}.toast{position:fixed;left:50%;bottom:20px;transform:translate(-50%,18px);opacity:0;padding:11px 15px;border-radius:999px;border:1px solid rgba(255,209,102,.4);background:rgba(4,12,21,.96);color:#ffe79e;font-weight:900;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:800px){.hero{grid-template-columns:1fr}.stats{grid-template-columns:repeat(4,1fr)}.stage{grid-template-columns:1fr}.side{grid-template-columns:1fr 1fr}.toolbar{align-items:flex-start;flex-direction:column}.pill{display:none}.hero-copy{padding:17px}.stat{min-height:68px;padding:9px}.stat strong{font-size:1.5rem}.game-shell{padding:8px}}@media(max-width:520px){.stats{grid-template-columns:repeat(2,1fr)}.side{grid-template-columns:1fr}.hero h1{font-size:3.4rem}.buttons{width:100%}.buttons .btn{flex:1}.big{min-height:74px}.fire{min-height:78px}}</style></head><body><main class="app"><header class="topbar"><a class="back" href="../index.html">← RETROCADE</a><span class="pill">MATTBEAR / INVADERS</span></header><section class="hero"><div class="hero-copy"><span class="eyebrow">Galaxy Defense</span><h1>Invaders</h1><p>Move. Aim. Fire.</p></div><div class="stats"><div class="stat"><span>Score</span><strong id="score">0</strong></div><div class="stat"><span>Lives</span><strong id="lives">3</strong></div><div class="stat"><span>Wave</span><strong id="wave">1</strong></div><div class="stat"><span>Tickets</span><strong id="tickets">0</strong></div></div></section><section class="game-shell"><div class="toolbar"><div class="status"><strong id="status">Ready</strong><span>Keyboard, mouse, touch, or Eye Control.</span></div><div class="buttons"><button class="btn" id="soundBtn">Sound On</button><button class="btn" id="eyeBtn">Eye Control</button><button class="btn primary" id="resetBtn">New Game</button></div></div><div class="stage"><div class="canvas-wrap"><canvas id="game" width="800" height="600" aria-label="Invaders game"></canvas><div class="guide" id="guide">Move or fire to start</div></div><aside class="side"><div class="panel"><strong>Move</strong><div class="move-row"><button class="big eye-target" data-move="left">◀</button><button class="big eye-target" data-move="right">▶</button></div></div><div class="panel"><strong>Fire</strong><button class="btn primary fire eye-target" id="fireBtn">FIRE</button></div><div class="panel"><strong>Controls</strong><p>Arrow keys or A/D move. Space or Enter fires. Move your mouse or drag to steer. Tap the field to fire.</p></div></aside></div></section></main><div class="toast" id="toast"></div><script>(()=>{const c=document.getElementById('game'),x=c.getContext('2d'),W=800,H=600,$=id=>document.getElementById(id);const scoreEl=$('score'),livesEl=$('lives'),waveEl=$('wave'),ticketsEl=$('tickets'),statusEl=$('status'),guide=$('guide'),toast=$('toast');let ship,shots,enemies,enemyShots,score,lives,wave,tickets,running,last,keys={},enemyDir=1,enemySpeed=28,enemyTimer=0,shootTimer=0,audioOn=true,eyeOn=false,dwellTimer=null,ac=null,musicTimer=null;function hud(){scoreEl.textContent=score;livesEl.textContent=lives;waveEl.textContent=wave;ticketsEl.textContent=tickets}function tone(f=440,d=.08,type='square',v=.05){if(!audioOn)return;try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();const o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}function music(){if(!audioOn||musicTimer)return;const notes=[110,147,165,147];let i=0;musicTimer=setInterval(()=>{if(running)tone(notes[i++%notes.length],.12,'triangle',.018)},360)}function stopMusic(){clearInterval(musicTimer);musicTimer=null}function ticket(n){tickets+=n;hud();try{const k='retrocadeState',s=JSON.parse(localStorage.getItem(k)||'{}');s.tickets=(s.tickets||0)+n;localStorage.setItem(k,JSON.stringify(s))}catch(e){}toast.textContent='+'+n+' tickets';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),900)}function makeWave(){enemies=[];for(let r=0;r<4;r++)for(let q=0;q<8;q++)enemies.push({x:118+q*72,y:68+r*52,w:42,h:30,alive:true,row:r});enemyDir=1;enemySpeed=28+wave*5}function reset(){ship={x:370,y:535,w:60,h:26};shots=[];enemyShots=[];score=0;lives=3;wave=1;tickets=0;running=false;last=0;enemyTimer=0;shootTimer=0;makeWave();hud();statusEl.textContent='Ready';guide.classList.remove('hide');draw()}function begin(){if(!running){running=true;statusEl.textContent='Playing';guide.classList.add('hide');music()}}function fire(){begin();if(shootTimer>0)return;shots.push({x:ship.x+ship.w/2-3,y:ship.y-8,w:6,h:18});shootTimer=.2;tone(620,.07,'square',.04)}function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function update(dt){if(!running)return;shootTimer=Math.max(0,shootTimer-dt);const dir=(keys.arrowleft||keys.a?-1:0)+(keys.arrowright||keys.d?1:0);ship.x=Math.max(8,Math.min(W-ship.w-8,ship.x+dir*360*dt));shots.forEach(s=>s.y-=520*dt);enemyShots.forEach(s=>s.y+=260*dt);shots=shots.filter(s=>s.y>-30);enemyShots=enemyShots.filter(s=>s.y<H+30);let minX=9999,maxX=-1,bottom=0;enemies.forEach(e=>{if(e.alive){e.x+=enemyDir*enemySpeed*dt;minX=Math.min(minX,e.x);maxX=Math.max(maxX,e.x+e.w);bottom=Math.max(bottom,e.y+e.h)}});if(minX<18||maxX>W-18){enemyDir*=-1;enemies.forEach(e=>{if(e.alive)e.y+=18})}for(const s of shots)for(const e of enemies){if(e.alive&&hit(s,e)){e.alive=false;s.y=-99;score+=10;tone(240+e.row*55,.08,'sawtooth',.04);break}}enemyTimer+=dt;if(enemyTimer>.72){enemyTimer=0;const live=enemies.filter(e=>e.alive);if(live.length){const e=live[Math.floor(Math.random()*live.length)];enemyShots.push({x:e.x+e.w/2-3,y:e.y+e.h,w:6,h:16});tone(150,.05,'triangle',.025)}}for(const s of enemyShots){if(hit(s,ship)){s.y=H+99;lives--;tone(80,.3,'sawtooth',.07);ship.x=370;if(lives<=0){ticket(Math.max(2,Math.floor(score/120)));stopMusic();reset();return}}}if(bottom>ship.y){ticket(Math.max(2,Math.floor(score/120)));stopMusic();reset();return}if(enemies.every(e=>!e.alive)){ticket(8+wave*2);wave++;makeWave();tone(880,.18,'triangle',.06)}hud()}function rr(a,b,w,h,r,col){x.fillStyle=col;x.beginPath();x.roundRect(a,b,w,h,r);x.fill()}function draw(){x.clearRect(0,0,W,H);const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#07192a');g.addColorStop(1,'#030912');x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle='rgba(255,255,255,.55)';for(let i=0;i<75;i++){const px=(i*97)%W,py=(i*53)%H;x.fillRect(px,py,i%7?1:2,i%7?1:2)}enemies.forEach(e=>{if(!e.alive)return;const col=e.row%2?'#9aff6a':'#42ddff';rr(e.x,e.y,e.w,e.h,9,col);x.fillStyle='#06131c';x.fillRect(e.x+8,e.y+9,7,7);x.fillRect(e.x+27,e.y+9,7,7);x.fillRect(e.x+13,e.y+22,16,4)});rr(ship.x,ship.y,ship.w,ship.h,8,'#ff74bd');x.fillStyle='#ffd166';x.beginPath();x.moveTo(ship.x+ship.w/2,ship.y-15);x.lineTo(ship.x+12,ship.y+8);x.lineTo(ship.x+ship.w-12,ship.y+8);x.closePath();x.fill();x.fillStyle='#f8fbff';shots.forEach(s=>x.fillRect(s.x,s.y,s.w,s.h));x.fillStyle='#ff667d';enemyShots.forEach(s=>x.fillRect(s.x,s.y,s.w,s.h))}function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys[k]=true;if(['arrowleft','arrowright',' ','enter'].includes(k))e.preventDefault();if(k===' '||k==='enter')fire();if(k==='r')reset()},{passive:false});document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);function point(e){const r=c.getBoundingClientRect();ship.x=Math.max(8,Math.min(W-ship.w-8,(e.clientX-r.left)/r.width*W-ship.w/2));begin()}c.addEventListener('pointermove',e=>{if(e.pointerType==='mouse'||e.buttons)point(e)});c.addEventListener('pointerdown',e=>{point(e);fire()});c.addEventListener('contextmenu',e=>e.preventDefault());document.querySelectorAll('[data-move]').forEach(btn=>{let raf;const go=()=>{begin();ship.x=Math.max(8,Math.min(W-ship.w-8,ship.x+(btn.dataset.move==='left'?-9:9)));raf=requestAnimationFrame(go)};btn.addEventListener('pointerdown',e=>{e.preventDefault();go()});['pointerup','pointerleave','pointercancel'].forEach(t=>btn.addEventListener(t,()=>cancelAnimationFrame(raf)))});$('fireBtn').addEventListener('click',fire);$('resetBtn').addEventListener('click',reset);$('soundBtn').addEventListener('click',()=>{audioOn=!audioOn;$('soundBtn').textContent=audioOn?'Sound On':'Sound Off';if(!audioOn)stopMusic();else if(running)music()});$('eyeBtn').addEventListener('click',()=>{eyeOn=!eyeOn;$('eyeBtn').classList.toggle('active',eyeOn);$('eyeBtn').textContent=eyeOn?'Eye Control On':'Eye Control'});document.querySelectorAll('.eye-target').forEach(el=>{el.addEventListener('pointerenter',()=>{if(!eyeOn)return;el.classList.add('dwelling');dwellTimer=setTimeout(()=>{el.click();el.classList.remove('dwelling')},900)});el.addEventListener('pointerleave',()=>{clearTimeout(dwellTimer);el.classList.remove('dwelling')})});reset();requestAnimationFrame(loop)})();</script></body></html>
