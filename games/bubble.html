<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Bubble - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='720' height='720'></canvas><div class='controls'><button onclick='resetBoard()'>RESET BOARD</button></div><p class='note'>Tap groups of matching bubbles. Bigger chains = better rewards.</p></div><script>retroHeader('BUBBLE SHOOTER');const c=document.getElementById('game'),g=c.getContext('2d');const colors=['#00ffcc','#ff2bd6','#ffe66d','#7cff6b'];let bubbles,score;function resetBoard(){bubbles=[];score=0;for(let y=0;y<9;y++)for(let x=0;x<10;x++)bubbles.push({gx:x,gy:y,x:70+x*58,y:70+y*58,c:colors[Math.floor(Math.random()*4)]});retroToast('BOARD RESET')}function neighbors(b){return bubbles.filter(o=>o!==b&&o.c===b.c&&Math.abs(o.gx-b.gx)+Math.abs(o.gy-b.gy)===1)}function cluster(start){const open=[start],seen=new Set([start]);while(open.length){neighbors(open.pop()).forEach(n=>{if(!seen.has(n)){seen.add(n);open.push(n)}})}return [...seen]}c.addEventListener('pointerdown',e=>{const r=c.getBoundingClientRect(),mx=((e.clientX-r.left)/r.width)*720,my=((e.clientY-r.top)/r.height)*720;const hit=bubbles.find(b=>Math.hypot(mx-b.x,my-b.y)<24);if(!hit)return;const chain=cluster(hit);if(chain.length<2){retroToast('Need a match');return}bubbles=bubbles.filter(b=>!chain.includes(b));score+=chain.length;retroWin(chain.length,chain.length*2,Math.floor(chain.length/4),'bubble');retroToast(chain.length+' bubble combo');if(bubbles.length===0){retroWin(80,120,10,'bubble');retroToast('BOARD CLEARED');setTimeout(resetBoard,1200)}});function loop(){g.fillStyle='#050507';g.fillRect(0,0,720,720);bubbles.forEach(b=>{g.fillStyle=b.c;g.beginPath();g.arc(b.x,b.y,22,0,7);g.fill();g.strokeStyle='rgba(255,255,255,.22)';g.stroke()});g.fillStyle='#ffe66d';g.font='22px Arial';g.fillText('Score '+score,20,32);requestAnimationFrame(loop)}resetBoard();loop();</script></body></html>
