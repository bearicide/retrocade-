<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Bubble - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='720' height='720'></canvas><p class='note'>Click to pop matching bubbles.</p></div><script>retroHeader('BUBBLE SHOOTER');const c=document.getElementById('game'),g=c.getContext('2d');let bubbles=[];const colors=['#00ffcc','#ff2bd6','#ffe66d','#7cff6b'];for(let y=0;y<8;y++)for(let x=0;x<10;x++)bubbles.push({x:70+x*58,y:70+y*58,c:colors[Math.floor(Math.random()*4)]});c.addEventListener('click',e=>{const r=c.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;bubbles=bubbles.filter(b=>{const hit=Math.hypot(mx-b.x,my-b.y)<22;if(hit)retroWin(1,1,0);return !hit});if(bubbles.length===0){retroWin(40,80,5);alert('BOARD CLEARED')}});function loop(){g.fillStyle='#050507';g.fillRect(0,0,720,720);bubbles.forEach(b=>{g.fillStyle=b.c;g.beginPath();g.arc(b.x,b.y,22,0,7);g.fill()});requestAnimationFrame(loop)}loop();</script></body></html>
