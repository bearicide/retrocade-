<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Bubble - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='720' height='720'></canvas><div class='controls'><button id='startBtn'>START</button><button id='resetBtn'>RESET BOARD</button><button id='shuffleBtn'>SHUFFLE</button></div><p class='note'>Tap, drag, keyboard scan, or touch controls. Pop matching color clusters. Bigger chains = better rewards.</p></div><div class='touch-controls'><div class='touch-pad-label'>BUBBLE CONTROL DECK</div><div class='actions'><button class='touch-btn wide primary' id='touchStart'>START</button><button class='touch-btn wide' id='touchShuffle'>SHUFFLE</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('BUBBLE SHOOTER');const c=document.getElementById('game'),g=c.getContext('2d');const colors=['#00ffcc','#ff2bd6','#ffe66d','#7cff6b'];let bubbles=[],score=0,combo=0,running=false,hover=null,pulse=0;function resetBoard(){bubbles=[];score=0;combo=0;running=false;for(let y=0;y<9;y++)for(let x=0;x<10;x++)bubbles.push({gx:x,gy:y,x:70+x*58+(y%2?29:0),y:72+y*58,c:colors[Math.floor(Math.random()*4)],pop:0});RetroState.show('READY','START TO POP','retro-ready',900)}function start(){running=true;RetroState.show('GO','FIND CHAINS','retro-ready',700)}function shuffle(){bubbles.forEach(b=>b.c=colors[Math.floor(Math.random()*4)]);RetroState.show('SHUFFLED','NEW COLORS','',700)}function neighbors(b){return bubbles.filter(o=>o!==b&&o.c===b.c&&Math.hypot(o.x-b.x,o.y-b.y)<64)}function cluster(start){const open=[start],seen=new Set([start]);while(open.length){neighbors(open.pop()).forEach(n=>{if(!seen.has(n)){seen.add(n);open.push(n)}})}return [...seen]}function popAt(mx,my){if(!running)start();const hit=bubbles.find(b=>Math.hypot(mx-b.x,my-b.y)<26);if(!hit)return;const chain=cluster(hit);if(chain.length<2){combo=0;RetroState.show('NO MATCH','TRY BIGGER GROUP','danger',520);return}chain.forEach(b=>b.pop=1);setTimeout(()=>{bubbles=bubbles.filter(b=>!chain.includes(b));score+=chain.length;combo++;retroWin(chain.length,chain.length*2,Math.floor(chain.length/4),'bubble');RetroState.show('POP '+chain.length,'COMBO '+combo,chain.length>=5?'bigwin':'',680);if(bubbles.length===0){running=false;retroWin(90,140,12,'bubble');RetroState.show('CLEARED','BOARD EMPTY','bigwin',1500);setTimeout(resetBoard,1400)}},120)}function getPoint(e){const r=c.getBoundingClientRect();return {x:((e.clientX-r.left)/r.width)*720,y:((e.clientY-r.top)/r.height)*720}}c.addEventListener('pointerdown',e=>{const p=getPoint(e);popAt(p.x,p.y)});c.addEventListener('pointermove',e=>{const p=getPoint(e);hover=bubbles.find(b=>Math.hypot(p.x-b.x,p.y-b.y)<26)||null});document.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')start();if(e.key==='r')resetBoard();if(e.key==='s')shuffle();if(e.key>='1'&&e.key<='9'){const i=Number(e.key)-1;if(bubbles[i])popAt(bubbles[i].x,bubbles[i].y)}});startBtn.onclick=touchStart.onclick=start;resetBtn.onclick=touchReset.onclick=resetBoard;shuffleBtn.onclick=touchShuffle.onclick=shuffle;function draw(){pulse+=.04;g.fillStyle='#050507';g.fillRect(0,0,720,720);g.fillStyle='rgba(0,255,204,.08)';for(let y=40;y<700;y+=58)g.fillRect(30,y,660,1);bubbles.forEach(b=>{const chain=hover?cluster(hover):[];const hi=chain.includes(b)&&chain.length>1;const r=22+(b.pop?10:0)+(hi?Math.sin(pulse*6)*2:0);g.shadowBlur=hi?22:8;g.shadowColor=b.c;g.fillStyle=b.c;g.beginPath();g.arc(b.x,b.y,r,0,7);g.fill();g.shadowBlur=0;g.strokeStyle='rgba(255,255,255,.28)';g.lineWidth=hi?3:1;g.stroke();if(b.pop)b.y-=2});g.fillStyle='#ffe66d';g.font='bold 22px Arial';g.fillText('SCORE '+score,20,32);g.fillText('LEFT '+bubbles.length,570,32);if(!running){g.font='bold 42px Arial';g.fillText('PRESS START',210,370)}requestAnimationFrame(draw)}resetBoard();draw();</script></body></html>
