<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Pong - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='900' height='520'></canvas><p class='note'>Keyboard, touch, or drag controls. Ancient paddle ritual restored.</p></div><div class='touch-controls'><div class='touch-pad-label'>PONG TOUCH CONTROLS</div><button class='touch-btn' id='upBtn'>▲</button><button class='touch-btn wide' id='downBtn'>▼</button></div><script>retroHeader('PONG');const c=document.getElementById('game'),g=c.getContext('2d');let l=200,r=200,b={x:450,y:260,vx:5,vy:4},ls=0,rs=0,move=0;document.addEventListener('keydown',e=>{if(e.key==='w')l-=24;if(e.key==='s')l+=24;if(e.key==='ArrowUp')move=-1;if(e.key==='ArrowDown')move=1});document.addEventListener('keyup',e=>{if(['ArrowUp','ArrowDown'].includes(e.key))move=0});upBtn.onpointerdown=()=>move=-1;downBtn.onpointerdown=()=>move=1;upBtn.onpointerup=downBtn.onpointerup=()=>move=0;c.addEventListener('pointermove',e=>{const rct=c.getBoundingClientRect();r=((e.clientY-rct.top)/rct.height)*c.height-60});function reset(){b={x:450,y:260,vx:(Math.random()>.5?5:-5),vy:4}}function loop(){r=Math.max(0,Math.min(400,r+move*7));g.fillStyle='#050507';g.fillRect(0,0,900,520);g.fillStyle='#00ffcc';g.fillRect(20,l,16,120);g.fillRect(864,r,16,120);g.fillRect(b.x,b.y,16,16);g.fillStyle='#ffe66d';g.font='28px Arial';g.fillText(ls,360,40);g.fillText(rs,520,40);b.x+=b.vx;b.y+=b.vy;if(b.y<0||b.y>504)b.vy*=-1;if(b.x<36&&b.y>l&&b.y<l+120)b.vx=Math.abs(b.vx);if(b.x>848&&b.y>r&&b.y<r+120)b.vx=-Math.abs(b.vx);if(b.x<0){rs++;reset()}if(b.x>900){ls++;retroWin(2,4,0,'pong');reset()}requestAnimationFrame(loop)}loop();</script></body></html>
