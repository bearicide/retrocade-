<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Pong - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='900' height='520'></canvas><div class='controls'><button id='startBtn'>START</button><button id='pauseBtn'>PAUSE</button><button id='resetBtn'>RESET MATCH</button></div><p class='note'>Keyboard, WASD, drag, swipe, touch deck, and cleaner rally pacing. Ancient paddle ritual upgraded.</p></div><div class='touch-controls'><div class='touch-pad-label'>PONG CONTROL DECK</div><div class='dpad'><button class='touch-btn up' id='upBtn'>▲</button><button class='touch-btn center primary' id='boostBtn'>BOOST</button><button class='touch-btn down' id='downBtn'>▼</button></div><div class='actions'><button class='touch-btn wide primary' id='touchStart'>START</button><button class='touch-btn wide' id='touchPause'>PAUSE</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('PONG');const c=document.getElementById('game'),g=c.getContext('2d');let left,right,ball,ls,rs,move,aiMove,rally,running,paused,shake,boost,lastTouch=null;function resetMatch(){left=200;right=200;ls=0;rs=0;move=0;aiMove=0;rally=0;running=false;paused=false;shake=0;boost=false;resetBall();RetroState.show('READY','START THE RALLY','retro-ready',900)}function start(){running=true;paused=false;RetroState.show('GO','RETURN FIRE','retro-ready',600)}function resetBall(){ball={x:450,y:260,vx:(Math.random()>.5?5:-5),vy:(Math.random()>.5?3.2:-3.2)}}function togglePause(){if(!running)return;paused=!paused;RetroState.show(paused?'PAUSED':'GO',paused?'PRESS START':'PLAY','',520)}function score(side){if(side==='left'){ls++;retroWin(6,10,1,'pong')}else rs++;rally=0;shake=8;RetroState.show(side==='left'?'POINT':'MISS',ls+' - '+rs,side==='left'?'bigwin':'danger',700);resetBall();if(ls>=7||rs>=7){running=false;RetroState.show(ls>rs?'YOU WIN':'CPU WINS','RESET FOR REMATCH',ls>rs?'bigwin':'danger',1400)}}function update(){if(!running||paused)return;right=Math.max(0,Math.min(400,right+move*(boost?11:7)));const target=ball.y-60;left+=Math.max(-5.5,Math.min(5.5,(target-left)*.06));left=Math.max(0,Math.min(400,left));ball.x+=ball.vx;ball.y+=ball.vy;if(ball.y<0||ball.y>504){ball.vy*=-1;shake=3}if(ball.x<44&&ball.y>left&&ball.y<left+120){ball.vx=Math.abs(ball.vx)*1.035;ball.vy+=(ball.y-(left+60))*.045;rally++;shake=5;retroWin(1,1,0,'pong')}if(ball.x>840&&ball.y>right&&ball.y<right+120){ball.vx=-Math.abs(ball.vx)*1.04;ball.vy+=(ball.y-(right+60))*.045;rally++;shake=5;if(rally%6===0)RetroState.show('RALLY',rally+' HITS','bigwin',500)}if(ball.x<0)score('right');if(ball.x>900)score('left')}function draw(){let ox=0,oy=0;if(shake>0){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake;shake*=.82}g.save();g.translate(ox,oy);g.fillStyle='#050507';g.fillRect(0,0,900,520);g.fillStyle='rgba(0,255,204,.12)';for(let y=0;y<520;y+=36)g.fillRect(448,y,4,20);g.fillStyle='#ff2bd6';g.fillRect(20,left,16,120);g.fillStyle='#00ffcc';g.fillRect(864,right,16,120);g.shadowBlur=18;g.shadowColor='#ffe66d';g.fillStyle='#ffe66d';g.fillRect(ball.x,ball.y,16,16);g.shadowBlur=0;g.font='bold 30px Arial';g.fillText(ls,350,45);g.fillText(rs,525,45);g.font='bold 18px Arial';g.fillText('RALLY '+rally,390,505);if(!running){g.font='bold 46px Arial';g.fillText('PRESS START',285,270)}if(paused){g.fillStyle='rgba(0,0,0,.56)';g.fillRect(0,0,900,520);g.fillStyle='#ffe66d';g.font='bold 56px Arial';g.fillText('PAUSED',340,270)}g.restore();requestAnimationFrame(loop)}function loop(){update();draw()}function setMove(v){move=v}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(upBtn,()=>setMove(-1),()=>setMove(0));bindHold(downBtn,()=>setMove(1),()=>setMove(0));bindHold(boostBtn,()=>boost=true,()=>boost=false);startBtn.onclick=touchStart.onclick=start;pauseBtn.onclick=touchPause.onclick=togglePause;resetBtn.onclick=touchReset.onclick=resetMatch;document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w')move=-1;if(e.key==='ArrowDown'||e.key==='s')move=1;if(e.key==='Shift')boost=true;if(e.key===' '||e.key==='Enter')start();if(e.key==='p')togglePause();if(e.key==='r')resetMatch()});document.addEventListener('keyup',e=>{if(['ArrowUp','ArrowDown','w','s'].includes(e.key))move=0;if(e.key==='Shift')boost=false});c.addEventListener('pointermove',e=>{const rct=c.getBoundingClientRect();right=((e.clientY-rct.top)/rct.height)*c.height-60;right=Math.max(0,Math.min(400,right))});c.addEventListener('pointerdown',e=>{lastTouch={x:e.clientX,y:e.clientY};if(!running)start()});c.addEventListener('pointerup',e=>{if(!lastTouch)return;const dy=e.clientY-lastTouch.y;if(dy>20)setMove(1);if(dy<-20)setMove(-1);setTimeout(()=>setMove(0),100);lastTouch=null});resetMatch();loop();</script></body></html>
