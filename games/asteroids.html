<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Asteroids - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='900' height='620'></canvas><p class='note'>Floaty space panic simulator.</p></div><script>retroHeader('ASTEROIDS');const c=document.getElementById('game'),g=c.getContext('2d');let ship={x:450,y:310,a:0},shots=[],rocks=[];for(let i=0;i<8;i++)rocks.push({x:Math.random()*900,y:Math.random()*620,vx:(Math.random()*2)-1,vy:(Math.random()*2)-1,r:30+Math.random()*20});document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')ship.a-=.2;if(e.key==='ArrowRight')ship.a+=.2;if(e.key==='ArrowUp'){ship.x+=Math.cos(ship.a)*10;ship.y+=Math.sin(ship.a)*10}if(e.key===' ')shots.push({x:ship.x,y:ship.y,vx:Math.cos(ship.a)*7,vy:Math.sin(ship.a)*7})});function loop(){g.fillStyle='#050507';g.fillRect(0,0,900,620);g.save();g.translate(ship.x,ship.y);g.rotate(ship.a);g.strokeStyle='#00ffcc';g.beginPath();g.moveTo(18,0);g.lineTo(-12,-10);g.lineTo(-6,0);g.lineTo(-12,10);g.closePath();g.stroke();g.restore();shots.forEach(s=>{s.x+=s.vx;s.y+=s.vy;g.fillStyle='#ffe66d';g.fillRect(s.x,s.y,4,4)});rocks=rocks.filter(r=>{r.x+=r.vx;r.y+=r.vy;g.strokeStyle='#ff2bd6';g.beginPath();g.arc(r.x,r.y,r.r,0,7);g.stroke();let hit=shots.some(s=>Math.hypot(s.x-r.x,s.y-r.y)<r.r);if(hit){retroWin(3,5,0);return false}return true});if(rocks.length===0){retroWin(60,120,15);alert('SECTOR CLEAR')}requestAnimationFrame(loop)}loop();</script></body></html>
