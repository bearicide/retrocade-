<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Asteroids - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='900' height='620'></canvas><p class='note'>Arrow keys/WASD, touch controls, or drag aim. Floaty space panic simulator.</p></div><div class='touch-controls'><div class='touch-pad-label'>ASTEROIDS TOUCH CONTROLS</div><button class='touch-btn' id='leftBtn'>⟲</button><button class='touch-btn' id='thrustBtn'>▲</button><button class='touch-btn' id='rightBtn'>⟳</button><button class='touch-btn wide' id='fireBtn'>FIRE</button></div><script>retroHeader('ASTEROIDS');const c=document.getElementById('game'),g=c.getContext('2d');let ship={x:450,y:310,a:0,vx:0,vy:0},shots=[],rocks=[],turn=0,thrust=false,cleared=false;function spawn(){rocks=[];for(let i=0;i<8;i++)rocks.push({x:Math.random()*900,y:Math.random()*620,vx:(Math.random()*2)-1,vy:(Math.random()*2)-1,r:30+Math.random()*20});cleared=false}function fire(){shots.push({x:ship.x,y:ship.y,vx:Math.cos(ship.a)*8,vy:Math.sin(ship.a)*8,life:70})}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(leftBtn,()=>turn=-1,()=>turn=0);bindHold(rightBtn,()=>turn=1,()=>turn=0);bindHold(thrustBtn,()=>thrust=true,()=>thrust=false);fireBtn.addEventListener('pointerdown',fire);document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')turn=-1;if(e.key==='ArrowRight'||e.key==='d')turn=1;if(e.key==='ArrowUp'||e.key==='w')thrust=true;if(e.key===' ')fire()});document.addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))turn=0;if(['ArrowUp','w'].includes(e.key))thrust=false});c.addEventListener('pointerdown',e=>{const r=c.getBoundingClientRect();const mx=((e.clientX-r.left)/r.width)*900,my=((e.clientY-r.top)/r.height)*620;ship.a=Math.atan2(my-ship.y,mx-ship.x);fire()});function wrap(o,w=900,h=620){if(o.x<0)o.x=w;if(o.x>w)o.x=0;if(o.y<0)o.y=h;if(o.y>h)o.y=0}function loop(){ship.a+=turn*.08;if(thrust){ship.vx+=Math.cos(ship.a)*.16;ship.vy+=Math.sin(ship.a)*.16}ship.x+=ship.vx;ship.y+=ship.vy;ship.vx*=.99;ship.vy*=.99;wrap(ship);g.fillStyle='#050507';g.fillRect(0,0,900,620);g.save();g.translate(ship.x,ship.y);g.rotate(ship.a);g.strokeStyle='#00ffcc';g.lineWidth=3;g.beginPath();g.moveTo(20,0);g.lineTo(-14,-11);g.lineTo(-8,0);g.lineTo(-14,11);g.closePath();g.stroke();g.restore();shots=shots.filter(s=>s.life-- >0);shots.forEach(s=>{s.x+=s.vx;s.y+=s.vy;wrap(s);g.fillStyle='#ffe66d';g.fillRect(s.x,s.y,4,4)});rocks=rocks.filter(r=>{r.x+=r.vx;r.y+=r.vy;wrap(r);g.strokeStyle='#ff2bd6';g.lineWidth=3;g.beginPath();g.arc(r.x,r.y,r.r,0,7);g.stroke();let hit=shots.some(s=>Math.hypot(s.x-r.x,s.y-r.y)<r.r);if(hit){retroWin(3,5,0,'asteroids');return false}return true});if(rocks.length===0&&!cleared){cleared=true;retroWin(60,120,15,'asteroids');retroToast('SECTOR CLEAR');setTimeout(spawn,900)}requestAnimationFrame(loop)}spawn();loop();</script></body></html>
