<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Asteroids - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='900' height='620'></canvas><div class='controls'><button id='startBtn'>START</button><button id='pauseBtn'>PAUSE</button><button id='resetBtn'>RESET SECTOR</button></div><p class='note'>Keyboard, WASD, touch deck, drag-aim, thrust, shields, and cleaner wave pacing. Floaty space panic simulator upgraded.</p></div><div class='touch-controls'><div class='touch-pad-label'>ASTEROIDS CONTROL DECK</div><div class='dpad'><button class='touch-btn left' id='leftBtn'>⟲</button><button class='touch-btn center primary' id='thrustBtn'>▲</button><button class='touch-btn right' id='rightBtn'>⟳</button></div><div class='actions'><button class='touch-btn wide primary' id='fireBtn'>FIRE</button><button class='touch-btn wide' id='shieldBtn'>SHIELD</button><button class='touch-btn wide' id='touchStart'>START</button><button class='touch-btn wide' id='touchPause'>PAUSE</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('ASTEROIDS');const c=document.getElementById('game'),g=c.getContext('2d');let ship,shots,rocks,particles,stars,turn,thrust,shield,running,paused,wave,score,shake,fireLock,lastTouch=null;function resetSector(){ship={x:450,y:310,a:0,vx:0,vy:0,shield:100,alive:true};shots=[];rocks=[];particles=[];stars=[];turn=0;thrust=false;shield=false;running=false;paused=false;wave=1;score=0;shake=0;fireLock=false;for(let i=0;i<90;i++)stars.push({x:Math.random()*900,y:Math.random()*620,s:Math.random()*2+.5});spawnWave();RetroState.show('READY','START SECTOR','retro-ready',900)}function start(){running=true;paused=false;RetroState.show('GO','CLEAR THE ROCKS','retro-ready',700)}function togglePause(){if(!running||!ship.alive)return;paused=!paused;RetroState.show(paused?'PAUSED':'GO',paused?'PRESS START':'FLY','',520)}function spawnWave(){rocks=[];const count=6+wave*2;for(let i=0;i<count;i++)rocks.push({x:Math.random()*900,y:Math.random()*620,vx:(Math.random()*2.8)-1.4,vy:(Math.random()*2.8)-1.4,r:28+Math.random()*24,spin:(Math.random()-.5)*.05,a:Math.random()*7});}function fire(){if(!running||paused||fireLock||!ship.alive)return;shots.push({x:ship.x+Math.cos(ship.a)*22,y:ship.y+Math.sin(ship.a)*22,vx:Math.cos(ship.a)*9+ship.vx,vy:Math.sin(ship.a)*9+ship.vy,life:62});fireLock=true;setTimeout(()=>fireLock=false,130);if(window.RetroAudio)RetroAudio.confirm()}function wrap(o,w=900,h=620){if(o.x<0)o.x=w;if(o.x>w)o.x=0;if(o.y<0)o.y=h;if(o.y>h)o.y=0}function burst(x,y,color,count){for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7,life:20+Math.random()*30,color})}function death(){ship.alive=false;running=false;shake=22;burst(ship.x,ship.y,'#ff2bd6',50);retroWin(Math.floor(score/25),score,0,'asteroids');RetroState.show('SHIP LOST','RESET SECTOR','danger',1600)}function update(){if(!running||paused||!ship.alive)return;ship.a+=turn*.075;if(thrust){ship.vx+=Math.cos(ship.a)*.17;ship.vy+=Math.sin(ship.a)*.17;burst(ship.x-Math.cos(ship.a)*18,ship.y-Math.sin(ship.a)*18,'#00ffcc',2)}ship.x+=ship.vx;ship.y+=ship.vy;ship.vx*=.992;ship.vy*=.992;wrap(ship);if(shield&&ship.shield>0)ship.shield-=.45;else shield=false;if(!shield&&ship.shield<100)ship.shield+=.08;shots=shots.filter(s=>s.life-- >0);shots.forEach(s=>{s.x+=s.vx;s.y+=s.vy;wrap(s)});rocks.forEach(r=>{r.x+=r.vx;r.y+=r.vy;r.a+=r.spin;wrap(r)});particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;p.life--});particles=particles.filter(p=>p.life>0);rocks=rocks.filter(r=>{let hit=shots.find(s=>Math.hypot(s.x-r.x,s.y-r.y)<r.r);if(hit){hit.life=0;score+=Math.round(35-r.r/2);burst(r.x,r.y,'#ffe66d',18);retroWin(3,5,0,'asteroids');if(r.r>30){rocks.push({x:r.x,y:r.y,vx:r.vx+1.4,vy:r.vy-.8,r:r.r*.55,spin:r.spin*1.5,a:0});rocks.push({x:r.x,y:r.y,vx:r.vx-1.2,vy:r.vy+1.1,r:r.r*.55,spin:-r.spin*1.5,a:0})}return false}if(Math.hypot(ship.x-r.x,ship.y-r.y)<r.r+16){if(shield){shake=9;ship.vx-=r.vx*.55;ship.vy-=r.vy*.55;burst(r.x,r.y,'#00ffcc',14);ship.shield=Math.max(0,ship.shield-18);return false}else death()}return true});shots=shots.filter(s=>s.life>0);if(rocks.length===0){wave++;score+=100;retroWin(50+wave*5,90+wave*8,8,'asteroids');RetroState.show('SECTOR CLEAR','WAVE '+wave,'bigwin',1100);spawnWave()}}function draw(){let ox=0,oy=0;if(shake>0){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake;shake*=.85}g.save();g.translate(ox,oy);g.fillStyle='#050507';g.fillRect(0,0,900,620);stars.forEach(s=>{g.fillStyle='rgba(255,255,255,.22)';g.fillRect(s.x,s.y,s.s,s.s)});rocks.forEach(r=>{g.save();g.translate(r.x,r.y);g.rotate(r.a);g.strokeStyle='#ff2bd6';g.shadowColor='#ff2bd6';g.shadowBlur=12;g.lineWidth=3;g.beginPath();for(let i=0;i<9;i++){let a=i/9*Math.PI*2,rad=r.r*(.78+Math.sin(i*1.7+r.a)*.16);let x=Math.cos(a)*rad,y=Math.sin(a)*rad;if(i===0)g.moveTo(x,y);else g.lineTo(x,y)}g.closePath();g.stroke();g.restore();g.shadowBlur=0});shots.forEach(s=>{g.fillStyle='#ffe66d';g.fillRect(s.x,s.y,5,5)});particles.forEach(p=>{g.globalAlpha=Math.max(0,p.life/35);g.fillStyle=p.color;g.fillRect(p.x,p.y,4,4);g.globalAlpha=1});if(ship.alive){g.save();g.translate(ship.x,ship.y);g.rotate(ship.a);g.strokeStyle='#00ffcc';g.lineWidth=3;g.shadowBlur=shield?28:12;g.shadowColor=shield?'#ffe66d':'#00ffcc';g.beginPath();g.moveTo(22,0);g.lineTo(-16,-12);g.lineTo(-9,0);g.lineTo(-16,12);g.closePath();g.stroke();if(thrust){g.strokeStyle='#ffe66d';g.beginPath();g.moveTo(-14,0);g.lineTo(-32,-8);g.lineTo(-26,0);g.lineTo(-32,8);g.stroke()}g.restore();g.shadowBlur=0;if(shield){g.strokeStyle='rgba(255,230,109,.85)';g.lineWidth=3;g.beginPath();g.arc(ship.x,ship.y,34,0,7);g.stroke()}}g.fillStyle='#ffe66d';g.font='bold 21px Arial';g.fillText('SCORE '+score,20,32);g.fillText('WAVE '+wave,390,32);g.fillText('SHIELD '+Math.round(ship.shield),730,32);if(!running&&ship.alive){g.font='bold 44px Arial';g.fillText('PRESS START',300,320)}if(paused){g.fillStyle='rgba(0,0,0,.56)';g.fillRect(0,0,900,620);g.fillStyle='#ffe66d';g.font='bold 56px Arial';g.fillText('PAUSED',340,325)}g.restore();requestAnimationFrame(loop)}function loop(){update();draw()}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(leftBtn,()=>turn=-1,()=>turn=0);bindHold(rightBtn,()=>turn=1,()=>turn=0);bindHold(thrustBtn,()=>thrust=true,()=>thrust=false);bindHold(shieldBtn,()=>shield=true,()=>shield=false);fireBtn.addEventListener('pointerdown',fire);startBtn.onclick=touchStart.onclick=start;pauseBtn.onclick=touchPause.onclick=togglePause;resetBtn.onclick=touchReset.onclick=resetSector;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')turn=-1;if(e.key==='ArrowRight'||e.key==='d')turn=1;if(e.key==='ArrowUp'||e.key==='w')thrust=true;if(e.key==='Shift')shield=true;if(e.key===' ')fire();if(e.key==='Enter')start();if(e.key==='p')togglePause();if(e.key==='r')resetSector()});document.addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))turn=0;if(['ArrowUp','w'].includes(e.key))thrust=false;if(e.key==='Shift')shield=false});c.addEventListener('pointerdown',e=>{const r=c.getBoundingClientRect();const mx=((e.clientX-r.left)/r.width)*900,my=((e.clientY-r.top)/r.height)*620;ship.a=Math.atan2(my-ship.y,mx-ship.x);if(!running)start();else fire();lastTouch={x:e.clientX,y:e.clientY}});c.addEventListener('pointermove',e=>{if(!running||!ship.alive)return;const r=c.getBoundingClientRect();const mx=((e.clientX-r.left)/r.width)*900,my=((e.clientY-r.top)/r.height)*620;ship.a=Math.atan2(my-ship.y,mx-ship.x)});resetSector();loop();</script></body></html>
