<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Blocks - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='420' height='720'></canvas><p class='note'>Simple falling blocks survival mode.</p></div><script>retroHeader('FALLING BLOCKS');const c=document.getElementById('game'),g=c.getContext('2d');let y=0,xp=0;function loop(){g.fillStyle='#050507';g.fillRect(0,0,420,720);g.fillStyle='#00ffcc';g.fillRect(180,y,60,60);y+=6;if(y>720){y=-60;retroWin(1,2,0);xp++}g.fillStyle='#ffe66d';g.font='24px Arial';g.fillText('Drops '+xp,20,30);requestAnimationFrame(loop)}loop();</script></body></html>
