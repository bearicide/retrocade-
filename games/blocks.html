<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Blocks - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='640' height='760'></canvas><div class='controls'><button id='startBtn'>START</button><button id='pauseBtn'>PAUSE</button><button id='resetBtn'>RESET RUN</button></div><p class='note'>Keyboard, WASD, drag, swipe, and touch controls. Dodge falling blocks with fairer hitboxes, scaling speed, and actual run states.</p></div><div class='touch-controls'><div class='touch-pad-label'>FALLING BLOCKS CONTROL DECK</div><div class='dpad'><button class='touch-btn left' id='leftBtn'>◀</button><button class='touch-btn center primary' id='dashBtn'>DASH</button><button class='touch-btn right' id='rightBtn'>▶</button></div><div class='actions'><button class='touch-btn wide primary' id='touchStart'>START</button><button class='touch-btn wide' id='touchPause'>PAUSE</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('FALLING BLOCKS');const c=document.getElementById('game'),g=c.getContext('2d');let player,blocks,score,move,alive,running,paused,speed,spawnTick,shake,dash,lastTouch=null;function resetGame(){player={x:290,y:668,w:58,h:42,inv:0};blocks=[];score=0;move=0;alive=true;running=false;paused=false;speed=4;spawnTick=0;shake=0;dash=false;RetroState.show('READY','START THE RUN','retro-ready',900)}function start(){if(!alive)resetGame();running=true;paused=false;RetroState.show('GO','DODGE','retro-ready',650)}function togglePause(){if(!running||!alive)return;paused=!paused;RetroState.show(paused?'PAUSED':'GO',paused?'PRESS START':'RUN','',520)}function hit(a,b){const pad=8;return a.x+pad<b.x+b.w-pad&&a.x+a.w-pad>b.x+pad&&a.y+pad<b.y+b.h-pad&&a.y+a.h-pad>b.y+pad}function spawn(){const w=36+Math.random()*76;blocks.push({x:Math.random()*(640-w),y:-70,w,h:34+Math.random()*48,c:['#ff2bd6','#00ffcc','#ffe66d','#7cff6b'][Math.floor(Math.random()*4)],v:speed+Math.random()*2,spin:Math.random()*6})}function crash(){alive=false;running=false;shake=18;retroWin(Math.floor(score/5),score,0,'blocks');RetroState.show('CRASH','RESET TO RUN AGAIN','danger',1500)}function update(){if(!running||paused||!alive)return;player.x=Math.max(0,Math.min(640-player.w,player.x+move*(dash?14:8)));if(player.inv>0)player.inv--;spawnTick++;if(spawnTick>Math.max(16,48-score/7)){spawn();spawnTick=0}speed=Math.min(13,4+score/75);blocks.forEach(b=>{b.y+=b.v;b.spin+=.08});blocks=blocks.filter(b=>{if(b.y>790){score++;if(score%10===0){retroWin(5,8,0,'blocks');RetroState.show('CHAIN','SCORE '+score,'bigwin',520)}return false}return true});if(player.inv<=0&&blocks.some(b=>hit(player,b)))crash()}function draw(){let ox=0,oy=0;if(shake>0){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake;shake*=.84}g.save();g.translate(ox,oy);g.fillStyle='#050507';g.fillRect(0,0,640,760);g.fillStyle='rgba(0,255,204,.08)';for(let y=0;y<760;y+=40)g.fillRect(0,y,640,2);blocks.forEach(b=>{g.save();g.translate(b.x+b.w/2,b.y+b.h/2);g.rotate(Math.sin(b.spin)*.08);g.fillStyle=b.c;g.shadowBlur=12;g.shadowColor=b.c;g.fillRect(-b.w/2,-b.h/2,b.w,b.h);g.shadowBlur=0;g.restore()});g.globalAlpha=player.inv>0?.45:1;g.fillStyle='#00ffcc';g.shadowBlur=18;g.shadowColor='#00ffcc';g.fillRect(player.x,player.y,player.w,player.h);g.shadowBlur=0;g.globalAlpha=1;g.fillStyle='#ffe66d';g.font='bold 22px Arial';g.fillText('SCORE '+score,20,32);g.fillText('SPEED '+speed.toFixed(1),500,32);if(!running&&alive){g.font='bold 44px Arial';g.fillText('PRESS START',180,390)}if(paused){g.fillStyle='rgba(0,0,0,.56)';g.fillRect(0,0,640,760);g.fillStyle='#ffe66d';g.font='bold 54px Arial';g.fillText('PAUSED',220,390)}if(!alive){g.fillStyle='rgba(0,0,0,.58)';g.fillRect(0,0,640,760);g.fillStyle='#ff2bd6';g.font='bold 54px Arial';g.fillText('BLOCKED',190,390)}g.restore();requestAnimationFrame(loop)}function loop(){update();draw()}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(leftBtn,()=>move=-1,()=>move=0);bindHold(rightBtn,()=>move=1,()=>move=0);bindHold(dashBtn,()=>dash=true,()=>dash=false);startBtn.onclick=touchStart.onclick=start;pauseBtn.onclick=touchPause.onclick=togglePause;resetBtn.onclick=touchReset.onclick=resetGame;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')move=-1;if(e.key==='ArrowRight'||e.key==='d')move=1;if(e.key==='Shift')dash=true;if(e.key===' '||e.key==='Enter')start();if(e.key==='p')togglePause();if(e.key==='r')resetGame()});document.addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))move=0;if(e.key==='Shift')dash=false});c.addEventListener('pointermove',e=>{if(!alive)return;const r=c.getBoundingClientRect();player.x=((e.clientX-r.left)/r.width)*640-player.w/2;player.x=Math.max(0,Math.min(640-player.w,player.x))});c.addEventListener('pointerdown',e=>{lastTouch={x:e.clientX,y:e.clientY};if(!running&&alive)start()});c.addEventListener('pointerup',e=>{if(!lastTouch)return;const dx=e.clientX-lastTouch.x;if(dx>24)move=1;if(dx<-24)move=-1;setTimeout(()=>move=0,110);lastTouch=null});resetGame();loop();</script></body></html>
