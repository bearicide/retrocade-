<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Blocks - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='520' height='720'></canvas><div class='controls'><button onclick='resetGame()'>RESET RUN</button></div><p class='note'>Dodge falling blocks. Keyboard, touch buttons, or drag. Simple panic, now with actual consequences.</p></div><div class='touch-controls'><div class='touch-pad-label'>FALLING BLOCKS TOUCH CONTROLS</div><button class='touch-btn' id='leftBtn'>◀</button><button class='touch-btn wide' onclick='resetGame()'>RESET</button><button class='touch-btn' id='rightBtn'>▶</button></div><script>retroHeader('FALLING BLOCKS');const c=document.getElementById('game'),g=c.getContext('2d');let player,blocks,score,best,move,alive,speed,spawnTick;function resetGame(){player={x:230,y:650,w:60,h:40};blocks=[];score=0;move=0;alive=true;speed=4;spawnTick=0;retroToast('RUN STARTED')}function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function spawn(){const w=36+Math.random()*64;blocks.push({x:Math.random()*(520-w),y:-60,w:w,h:34+Math.random()*44,c:['#ff2bd6','#00ffcc','#ffe66d','#7cff6b'][Math.floor(Math.random()*4)]})}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(leftBtn,()=>move=-1,()=>move=0);bindHold(rightBtn,()=>move=1,()=>move=0);document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')move=-1;if(e.key==='ArrowRight'||e.key==='d')move=1});document.addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))move=0});c.addEventListener('pointermove',e=>{if(!alive)return;const r=c.getBoundingClientRect();player.x=((e.clientX-r.left)/r.width)*520-player.w/2;player.x=Math.max(0,Math.min(520-player.w,player.x))});function loop(){if(alive){player.x=Math.max(0,Math.min(520-player.w,player.x+move*8));spawnTick++;if(spawnTick>Math.max(18,46-score/8)){spawn();spawnTick=0}speed=4+score/80;blocks.forEach(b=>b.y+=speed);blocks=blocks.filter(b=>{if(b.y>740){score++;if(score%10===0)retroWin(3,5,0,'blocks');return false}return true});if(blocks.some(b=>hit(player,b))){alive=false;retroWin(Math.floor(score/5),score,0,'blocks');retroToast('BLOCKED - reset to run again')}}g.fillStyle='#050507';g.fillRect(0,0,520,720);g.fillStyle='rgba(0,255,204,.08)';for(let y=0;y<720;y+=40)g.fillRect(0,y,520,2);blocks.forEach(b=>{g.fillStyle=b.c;g.fillRect(b.x,b.y,b.w,b.h)});g.fillStyle='#00ffcc';g.fillRect(player.x,player.y,player.w,player.h);g.fillStyle='#ffe66d';g.font='22px Arial';g.fillText('Score '+score,20,32);if(!alive){g.font='34px Arial';g.fillText('CRASH',200,340)}requestAnimationFrame(loop)}resetGame();loop();</script></body></html>
