<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Breakout - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='800' height='520'></canvas><div class='controls'><button onclick='resetBall()'>RESET BALL</button></div><p class='note'>Mouse, touch/drag, or bottom buttons. Break bricks. Consume dopamine responsibly.</p></div><div class='touch-controls'><div class='touch-pad-label'>BREAKOUT TOUCH CONTROLS</div><button class='touch-btn' id='leftBtn'>◀</button><button class='touch-btn wide' onclick='resetBall()'>RESET</button><button class='touch-btn' id='rightBtn'>▶</button></div><script>retroHeader('BREAKOUT');const c=document.getElementById('game'),g=c.getContext('2d');let paddle=330,ball={x:400,y:300,vx:4,vy:-4},bricks=[],move=0,cleared=false;function build(){bricks=[];for(let y=0;y<5;y++)for(let x=0;x<10;x++)bricks.push({x:x*76+20,y:y*28+30,w:68,h:18,hp:1});cleared=false}function resetBall(){ball={x:400,y:300,vx:4*(Math.random()>.5?1:-1),vy:-4}}function setPaddleFromEvent(e){const r=c.getBoundingClientRect();const clientX=e.touches?e.touches[0].clientX:e.clientX;paddle=((clientX-r.left)/r.width)*c.width-70;paddle=Math.max(0,Math.min(c.width-140,paddle))}c.addEventListener('pointermove',setPaddleFromEvent);c.addEventListener('pointerdown',setPaddleFromEvent);c.addEventListener('touchmove',e=>{e.preventDefault();setPaddleFromEvent(e)},{passive:false});leftBtn.onpointerdown=()=>move=-1;rightBtn.onpointerdown=()=>move=1;leftBtn.onpointerup=rightBtn.onpointerup=leftBtn.onpointerleave=rightBtn.onpointerleave=()=>move=0;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')move=-1;if(e.key==='ArrowRight'||e.key==='d')move=1});document.addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))move=0});function loop(){if(move)paddle=Math.max(0,Math.min(c.width-140,paddle+move*9));g.fillStyle='#050507';g.fillRect(0,0,c.width,c.height);g.fillStyle='#00ffcc';g.fillRect(paddle,480,140,16);g.beginPath();g.arc(ball.x,ball.y,10,0,7);g.fill();g.fillStyle='#ff2bd6';bricks.forEach(b=>g.fillRect(b.x,b.y,b.w,b.h));ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x<10||ball.x>790)ball.vx*=-1;if(ball.y<10)ball.vy*=-1;if(ball.y>520)resetBall();if(ball.y>468&&ball.x>paddle&&ball.x<paddle+140)ball.vy=-Math.abs(ball.vy);bricks=bricks.filter(b=>{const hit=ball.x>b.x&&ball.x<b.x+b.w&&ball.y>b.y&&ball.y<b.y+b.h;if(hit){ball.vy*=-1;retroWin(1,2,0,'breakout');return false}return true});if(bricks.length===0&&!cleared){cleared=true;retroWin(25,50,5,'breakout');retroToast('CLEAR! New wall incoming');setTimeout(build,900)}requestAnimationFrame(loop)}build();loop();</script></body></html>
