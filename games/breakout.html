<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0b1020"><title>Breakout | RETROCADE</title><style>:root{--ink:#fff;--muted:#c8d1e8;--line:rgba(255,255,255,.15);--panel:rgba(20,28,52,.9);--cyan:#34d8ff;--violet:#8b6cff;--pink:#ff70b3;--gold:#ffd166;--green:#69e3a4}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 10% 0,rgba(139,108,255,.3),transparent 28rem),radial-gradient(circle at 95% 5%,rgba(52,216,255,.22),transparent 26rem),linear-gradient(#111a31,#080d18);color:var(--ink)}body{padding:8px;overflow-x:hidden}.app{width:min(1080px,100%);margin:auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.top a{color:#fff;text-decoration:none;font-weight:900}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:8px;margin-bottom:8px}.card,.game{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 22px 70px rgba(0,0,0,.35)}.intro{padding:18px}.intro small{color:var(--cyan);font-weight:950;letter-spacing:.12em}.intro h1{font-size:clamp(3rem,11vw,6rem);line-height:.9;margin:4px 0}.intro p{margin:0;color:var(--muted);font-weight:700}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px}.stat{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:16px;padding:10px;min-height:70px;display:flex;flex-direction:column;justify-content:space-between}.stat span{font-size:.68rem;color:var(--muted);font-weight:900;text-transform:uppercase}.stat b{font-size:1.6rem}.game{padding:8px}.bar{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-bottom:8px}.bar-copy b{display:block}.bar-copy span{color:var(--muted);font-size:.86rem}.actions{display:flex;gap:6px;flex-wrap:wrap}.btn{min-height:48px;border:1px solid var(--line);border-radius:15px;padding:10px 14px;background:rgba(255,255,255,.09);color:#fff;font-weight:950}.btn.primary{background:linear-gradient(135deg,var(--cyan),#577cff);color:#06111c;border:0}.btn.active{background:linear-gradient(135deg,var(--gold),#ff9e4a);color:#2b1600}.stage{display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:8px}.play{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--line);background:#07101c}.play canvas{display:block;width:100%;height:auto;aspect-ratio:4/3;touch-action:none}.guide{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(5,10,20,.88);padding:14px 18px;border-radius:18px;border:1px solid var(--line);text-align:center;font-weight:950;transition:.5s;pointer-events:none}.guide.hide{opacity:0;transform:translate(-50%,-42%)}.side{display:grid;gap:8px}.panel{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:17px;padding:10px}.panel strong{display:block;margin-bottom:6px}.move{display:grid;grid-template-columns:1fr 1fr;gap:8px}.move button{min-height:76px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(rgba(255,255,255,.15),rgba(255,255,255,.07));color:#fff;font-size:2rem;font-weight:950}.launch{width:100%;min-height:66px;font-size:1.1rem}.eye{display:none;position:absolute;inset:0;grid-template-columns:1fr 1fr;pointer-events:none}.eye-on .eye{display:grid;pointer-events:auto}.eye button{position:relative;border:0;background:transparent}.eye button:after{content:attr(data-label);position:absolute;bottom:18px;left:50%;transform:translateX(-50%);padding:8px 12px;border-radius:999px;background:rgba(5,10,20,.8);color:#fff;font-weight:950}.eye button.dwelling{background:rgba(255,209,102,.11);outline:4px solid var(--gold);outline-offset:-10px}.toast{position:fixed;left:50%;bottom:16px;transform:translate(-50%,18px);opacity:0;background:#10172b;border:1px solid rgba(255,209,102,.5);padding:10px 14px;border-radius:999px;color:#ffe8a3;font-weight:950;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:760px){.hero{grid-template-columns:1fr}.stage{grid-template-columns:1fr}.side{grid-template-columns:1fr 1fr}.bar{align-items:flex-start;flex-direction:column}.actions{width:100%}.actions .btn{flex:1}.intro{padding:15px}.intro h1{font-size:3.5rem}}@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}.side{grid-template-columns:1fr}.stat{min-height:64px}.move button{min-height:82px}.panel.help{display:none}}</style></head><body><main class="app"><header class="top"><a href="../index.html">← Games</a><b>MATTBEAR / BREAKOUT</b></header><section class="hero"><div class="card intro"><small>SMASH THE WALL</small><h1>Breakout</h1><p>Move the paddle. Keep the ball alive. Break every block.</p></div><div class="card stats"><div class="stat"><span>Score</span><b id="score">0</b></div><div class="stat"><span>Lives</span><b id="lives">3</b></div><div class="stat"><span>Level</span><b id="level">1</b></div><div class="stat"><span>Tickets</span><b id="tickets">0</b></div></div></section><section class="game"><div class="bar"><div class="bar-copy"><b id="status">Ready</b><span>Move, then tap to launch.</span></div><div class="actions"><button class="btn" id="soundBtn">Sound On</button><button class="btn" id="eyeBtn">Eye Control</button><button class="btn" id="pauseBtn">Pause</button><button class="btn primary" id="resetBtn">New Game</button></div></div><div class="stage"><div class="play" id="play"><canvas id="game" width="800" height="600"></canvas><div class="guide" id="guide">Move left or right<br>Tap to launch</div><div class="eye"><button data-eye="left" data-label="LOOK LEFT"></button><button data-eye="right" data-label="LOOK RIGHT"></button></div></div><aside class="side"><div class="panel"><strong>Move</strong><div class="move"><button data-move="left">◀</button><button data-move="right">▶</button></div></div><div class="panel"><button class="btn primary launch" id="launchBtn">LAUNCH</button></div><div class="panel help"><strong>Use anything</strong><span>Keyboard, mouse, touch, or Eye Control.</span></div></aside></div></section></main><div class="toast" id="toast"></div><script>(()=>{const c=document.getElementById('game'),x=c.getContext('2d'),W=800,H=600,play=document.getElementById('play'),guide=document.getElementById('guide');const scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),levelEl=document.getElementById('level'),ticketsEl=document.getElementById('tickets'),statusEl=document.getElementById('status'),toast=document.getElementById('toast');let paddle,ball,bricks=[],score=0,lives=3,level=1,tickets=0,paused=false,last=0,keys={},audio=null,muted=false,musicTimer=null,eyeMode=false,dwellTimer=null;const colors=['#ff70b3','#ffd166','#69e3a4','#34d8ff','#8b6cff'];function audioOn(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)();if(audio.state==='suspended')audio.resume()}function tone(f=440,d=.08,type='sine',v=.05,delay=0){if(muted)return;audioOn();const o=audio.createOscillator(),g=audio.createGain(),t=audio.currentTime+delay;o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(g).connect(audio.destination);o.start(t);o.stop(t+d)}function sfx(name){if(name==='launch'){tone(220,.08,'square',.05);tone(440,.1,'square',.04,.05)}if(name==='brick'){tone(520+Math.random()*220,.05,'triangle',.04)}if(name==='paddle')tone(180,.06,'square',.05);if(name==='lose'){tone(180,.18,'sawtooth',.05);tone(100,.24,'sawtooth',.04,.12)}if(name==='win'){[523,659,784,1046].forEach((f,i)=>tone(f,.16,'triangle',.05,i*.08))}}function music(start=true){clearInterval(musicTimer);if(!start||muted)return;let i=0,notes=[131,165,196,165,147,185,220,185];musicTimer=setInterval(()=>{if(!paused&&ball&&!ball.stuck)tone(notes[i++%notes.length],.18,'sine',.018)},360)}function ticket(n){tickets+=n;ticketsEl.textContent=tickets;try{const s=JSON.parse(localStorage.getItem('retrocadeState')||'{}');s.tickets=(s.tickets||0)+n;localStorage.setItem('retrocadeState',JSON.stringify(s))}catch(e){}toast.textContent='+'+n+' tickets';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),900)}function build(){bricks=[];for(let r=0;r<5;r++)for(let col=0;col<10;col++)bricks.push({x:44+col*72,y:70+r*34,w:64,h:24,color:colors[r],alive:true})}function resetBall(){ball={x:paddle.x+paddle.w/2,y:paddle.y-14,r:11,vx:4.2+level*.25,vy:-5.2-level*.2,stuck:true};statusEl.textContent='Ready';guide.classList.remove('hide')}function reset(){score=0;lives=3;level=1;tickets=0;paddle={x:320,y:540,w:160,h:20};build();resetBall();paused=false;hud()}function hud(){scoreEl.textContent=score;livesEl.textContent=lives;levelEl.textContent=level;ticketsEl.textContent=tickets}function launch(){audioOn();if(paused||!ball.stuck)return;ball.stuck=false;statusEl.textContent='Playing';guide.classList.add('hide');sfx('launch');music()}function moveTo(px){paddle.x=Math.max(8,Math.min(W-paddle.w-8,px-paddle.w/2));if(ball.stuck)ball.x=paddle.x+paddle.w/2;guide.classList.add('hide')}function hit(b){const cx=Math.max(b.x,Math.min(ball.x,b.x+b.w)),cy=Math.max(b.y,Math.min(ball.y,b.y+b.h)),dx=ball.x-cx,dy=ball.y-cy;return dx*dx+dy*dy<ball.r*ball.r}function update(dt){if(paused)return;let d=(keys.ArrowLeft||keys.a?-1:0)+(keys.ArrowRight||keys.d?1:0);if(d)moveTo(paddle.x+paddle.w/2+d*9*dt*60);if(ball.stuck){ball.x=paddle.x+paddle.w/2;return}ball.x+=ball.vx*dt*60;ball.y+=ball.vy*dt*60;if(ball.x<ball.r){ball.x=ball.r;ball.vx=Math.abs(ball.vx)}if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx)}if(ball.y<ball.r){ball.y=ball.r;ball.vy=Math.abs(ball.vy)}if(hit(paddle)&&ball.vy>0){ball.vx=((ball.x-(paddle.x+paddle.w/2))/(paddle.w/2))*7.5;ball.vy=-Math.abs(ball.vy);ball.y=paddle.y-ball.r;sfx('paddle')}for(const b of bricks){if(b.alive&&hit(b)){b.alive=false;ball.vy*=-1;score+=10;hud();sfx('brick');break}}if(bricks.every(b=>!b.alive)){sfx('win');ticket(10+level*2);level++;build();resetBall();hud()}if(ball.y>H+30){lives--;hud();sfx('lose');if(lives<=0){ticket(Math.max(2,Math.floor(score/100)));reset()}else resetBall()}}function rr(a,b,w,h,r,col){x.fillStyle=col;x.beginPath();x.roundRect(a,b,w,h,r);x.fill()}function draw(){x.clearRect(0,0,W,H);let g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0b1730');g.addColorStop(1,'#07101c');x.fillStyle=g;x.fillRect(0,0,W,H);bricks.forEach(b=>{if(!b.alive)return;x.shadowColor=b.color;x.shadowBlur=12;rr(b.x,b.y,b.w,b.h,8,b.color);x.shadowBlur=0});rr(paddle.x,paddle.y,paddle.w,paddle.h,10,'#fff');x.shadowColor='#34d8ff';x.shadowBlur=18;x.fillStyle='#34d8ff';x.beginPath();x.arc(ball.x,ball.y,ball.r,0,Math.PI*2);x.fill();x.shadowBlur=0;if(paused){x.fillStyle='rgba(4,8,16,.55)';x.fillRect(0,0,W,H);x.fillStyle='#fff';x.textAlign='center';x.font='800 36px system-ui';x.fillText('Paused',W/2,H/2)}}function loop(t){let dt=Math.min(.033,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}document.addEventListener('keydown',e=>{let k=e.key.toLowerCase();keys[e.key]=true;keys[k]=true;if(['arrowleft','arrowright',' ','enter'].includes(k))e.preventDefault();if(k===' '||k==='enter')launch();if(k==='p')togglePause();if(k==='r')reset()},{passive:false});document.addEventListener('keyup',e=>{keys[e.key]=false;keys[e.key.toLowerCase()]=false});function pointer(e){let r=c.getBoundingClientRect();moveTo((e.clientX-r.left)/r.width*W)}c.addEventListener('pointermove',e=>{if(e.pointerType==='mouse'||e.buttons)pointer(e)});c.addEventListener('pointerdown',e=>{pointer(e);launch()});document.querySelectorAll('[data-move]').forEach(b=>{let raf;const go=()=>{moveTo(paddle.x+paddle.w/2+(b.dataset.move==='left'?-34:34));raf=requestAnimationFrame(go)};b.addEventListener('pointerdown',e=>{e.preventDefault();audioOn();go()});['pointerup','pointerleave','pointercancel'].forEach(t=>b.addEventListener(t,()=>cancelAnimationFrame(raf)))});document.querySelectorAll('[data-eye]').forEach(b=>{b.addEventListener('pointerenter',()=>{if(!eyeMode)return;b.classList.add('dwelling');clearTimeout(dwellTimer);dwellTimer=setTimeout(()=>{moveTo(b.dataset.eye==='left'?140:660);launch();b.classList.remove('dwelling')},1100)});b.addEventListener('pointerleave',()=>{clearTimeout(dwellTimer);b.classList.remove('dwelling')})});function togglePause(){paused=!paused;statusEl.textContent=paused?'Paused':ball.stuck?'Ready':'Playing';document.getElementById('pauseBtn').textContent=paused?'Resume':'Pause'}document.getElementById('launchBtn').onclick=launch;document.getElementById('pauseBtn').onclick=togglePause;document.getElementById('resetBtn').onclick=reset;document.getElementById('soundBtn').onclick=()=>{audioOn();muted=!muted;document.getElementById('soundBtn').textContent=muted?'Sound Off':'Sound On';if(!muted)music()};document.getElementById('eyeBtn').onclick=()=>{eyeMode=!eyeMode;play.classList.toggle('eye-on',eyeMode);document.getElementById('eyeBtn').classList.toggle('active',eyeMode);document.getElementById('eyeBtn').textContent=eyeMode?'Eye Control On':'Eye Control'};reset();requestAnimationFrame(loop)})();</script></body></html>
