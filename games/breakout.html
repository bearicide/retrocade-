<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Breakout - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='800' height='560'></canvas><div class='controls'><button id='startBtn'>START</button><button id='pauseBtn'>PAUSE</button><button id='resetBtn'>RESET WALL</button></div><p class='note'>Mouse, touch/drag, keyboard, swipe, and control deck. Break bricks. Consume dopamine responsibly.</p></div><div class='touch-controls'><div class='touch-pad-label'>BREAKOUT CONTROL DECK</div><div class='dpad'><button class='touch-btn left' id='leftBtn'>◀</button><button class='touch-btn center primary' id='boostBtn'>BOOST</button><button class='touch-btn right' id='rightBtn'>▶</button></div><div class='actions'><button class='touch-btn wide primary' id='touchStart'>START</button><button class='touch-btn wide' id='touchPause'>PAUSE</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('BREAKOUT');const c=document.getElementById('game'),g=c.getContext('2d');let paddle,ball,bricks,move,running,paused,score,level,lives,shake,boost,lastTouch=null;function buildWall(){bricks=[];for(let y=0;y<6;y++)for(let x=0;x<10;x++)bricks.push({x:x*76+20,y:y*28+38,w:68,h:18,hp:y<2?2:1,c:['#ff2bd6','#00ffcc','#ffe66d','#7cff6b'][y%4]})}function resetBall(){ball={x:400,y:360,vx:4.5*(Math.random()>.5?1:-1),vy:-4.8,stuck:true}}function resetGame(){paddle=330;move=0;running=false;paused=false;score=0;level=1;lives=3;shake=0;boost=false;buildWall();resetBall();RetroState.show('READY','START TO BREAK','retro-ready',900)}function start(){running=true;paused=false;if(ball.stuck)ball.stuck=false;RetroState.show('GO','BREAK THE WALL','retro-ready',650)}function togglePause(){if(!running)return;paused=!paused;RetroState.show(paused?'PAUSED':'GO',paused?'PRESS START':'PLAY','',520)}function resetWall(){buildWall();resetBall();running=false;RetroState.show('RESET','WALL READY','',700)}function loseLife(){lives--;shake=14;RetroState.show('BALL LOST','LIVES '+lives,'danger',700);if(lives<=0){running=false;RetroState.show('GAME OVER','RESET WALL','danger',1500);retroWin(Math.floor(score/8),score,0,'breakout')}else resetBall()}function setPaddleFromEvent(e){const r=c.getBoundingClientRect();const clientX=e.touches?e.touches[0].clientX:e.clientX;paddle=((clientX-r.left)/r.width)*c.width-70;paddle=Math.max(0,Math.min(c.width-140,paddle))}function update(){if(!running||paused)return;if(move)paddle=Math.max(0,Math.min(c.width-140,paddle+move*(boost?13:8)));if(ball.stuck){ball.x=paddle+70;ball.y=448;return}ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x<10||ball.x>790){ball.vx*=-1;shake=3}if(ball.y<10){ball.vy*=-1;shake=3}if(ball.y>560)loseLife();if(ball.y>462&&ball.y<500&&ball.x>paddle&&ball.x<paddle+140){const hit=(ball.x-(paddle+70))/70;ball.vx=hit*6.5;ball.vy=-Math.abs(ball.vy)*1.015;shake=5;if(window.RetroAudio)RetroAudio.confirm()}bricks=bricks.filter(b=>{const hit=ball.x>b.x&&ball.x<b.x+b.w&&ball.y>b.y&&ball.y<b.y+b.h;if(hit){ball.vy*=-1;b.hp--;shake=6;score+=b.hp>0?3:8;retroWin(1,2,0,'breakout');if(b.hp>0)return true;return false}return true});if(bricks.length===0){level++;score+=100;retroWin(40+level*5,80+level*6,7,'breakout');RetroState.show('CLEAR','LEVEL '+level,'bigwin',1000);buildWall();resetBall()}}function draw(){let ox=0,oy=0;if(shake>0){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake;shake*=.84}g.save();g.translate(ox,oy);g.fillStyle='#050507';g.fillRect(0,0,800,560);g.fillStyle='rgba(0,255,204,.08)';for(let y=0;y<560;y+=32)g.fillRect(0,y,800,1);bricks.forEach(b=>{g.fillStyle=b.c;g.shadowBlur=12;g.shadowColor=b.c;g.fillRect(b.x,b.y,b.w,b.h);g.shadowBlur=0;if(b.hp>1){g.fillStyle='rgba(0,0,0,.35)';g.fillRect(b.x+5,b.y+5,b.w-10,4)}});g.fillStyle='#00ffcc';g.shadowBlur=16;g.shadowColor='#00ffcc';g.fillRect(paddle,480,140,16);g.shadowBlur=22;g.shadowColor='#ffe66d';g.fillStyle='#ffe66d';g.beginPath();g.arc(ball.x,ball.y,10,0,7);g.fill();g.shadowBlur=0;g.fillStyle='#ffe66d';g.font='bold 20px Arial';g.fillText('SCORE '+score,20,30);g.fillText('LEVEL '+level,350,30);g.fillText('LIVES '+lives,690,30);if(!running){g.font='bold 44px Arial';g.fillText('PRESS START',250,295)}if(paused){g.fillStyle='rgba(0,0,0,.56)';g.fillRect(0,0,800,560);g.fillStyle='#ffe66d';g.font='bold 54px Arial';g.fillText('PAUSED',285,295)}g.restore();requestAnimationFrame(loop)}function loop(){update();draw()}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(leftBtn,()=>move=-1,()=>move=0);bindHold(rightBtn,()=>move=1,()=>move=0);bindHold(boostBtn,()=>boost=true,()=>boost=false);startBtn.onclick=touchStart.onclick=start;pauseBtn.onclick=touchPause.onclick=togglePause;resetBtn.onclick=touchReset.onclick=resetWall;c.addEventListener('pointermove',setPaddleFromEvent);c.addEventListener('pointerdown',e=>{setPaddleFromEvent(e);if(!running)start();lastTouch={x:e.clientX,y:e.clientY}});c.addEventListener('touchmove',e=>{e.preventDefault();setPaddleFromEvent(e)},{passive:false});c.addEventListener('pointerup',e=>{if(!lastTouch)return;const dx=e.clientX-lastTouch.x;if(dx>24)move=1;if(dx<-24)move=-1;setTimeout(()=>move=0,110);lastTouch=null});document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')move=-1;if(e.key==='ArrowRight'||e.key==='d')move=1;if(e.key==='Shift')boost=true;if(e.key===' '||e.key==='Enter')start();if(e.key==='p')togglePause();if(e.key==='r')resetWall()});document.addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))move=0;if(e.key==='Shift')boost=false});resetGame();loop();</script></body></html>
