<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Breakout - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='800' height='520'></canvas><p class='note'>Break bricks. Consume dopamine responsibly.</p></div><script>retroHeader('BREAKOUT');const c=document.getElementById('game'),g=c.getContext('2d');let paddle=330,ball={x:400,y:300,vx:4,vy:-4},bricks=[];for(let y=0;y<5;y++)for(let x=0;x<10;x++)bricks.push({x:x*76+20,y:y*28+30,w:68,h:18,hp:1});document.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();paddle=e.clientX-r.left-70});function loop(){g.fillStyle='#050507';g.fillRect(0,0,c.width,c.height);g.fillStyle='#00ffcc';g.fillRect(paddle,480,140,16);g.beginPath();g.arc(ball.x,ball.y,10,0,7);g.fill();g.fillStyle='#ff2bd6';bricks.forEach(b=>g.fillRect(b.x,b.y,b.w,b.h));ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x<10||ball.x>790)ball.vx*=-1;if(ball.y<10)ball.vy*=-1;if(ball.y>520){ball={x:400,y:300,vx:4,vy:-4}}if(ball.y>468&&ball.x>paddle&&ball.x<paddle+140)ball.vy=-Math.abs(ball.vy);bricks=bricks.filter(b=>{const hit=ball.x>b.x&&ball.x<b.x+b.w&&ball.y>b.y&&ball.y<b.y+b.h;if(hit){ball.vy*=-1;retroWin(1,2,0);return false}return true});if(bricks.length===0){retroWin(25,50,5);alert('CLEAR!')}requestAnimationFrame(loop)}loop();</script></body></html>
