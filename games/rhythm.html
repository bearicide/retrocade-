<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Rhythm Pads - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><div class='controls'><button id='tempoDown'>TEMPO -</button><button id='tempoUp'>TEMPO +</button><button id='muteBtn'>MUTE</button></div><div id='pads' style='display:grid;grid-template-columns:repeat(2,minmax(120px,1fr));gap:16px;max-width:520px;margin:auto'></div><p class='note'>Touch, mouse, keyboard, tempo control, and audio-reactive pad glow. Nightclub goblin engineering upgraded.</p></div><script>retroHeader('RHYTHM PADS');const tones=[220,330,440,550];const keys=['1','2','3','4'];const ctx=new(window.AudioContext||window.webkitAudioContext)();let tempo=1,muted=false;function beep(freq,el){if(muted)return;const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=freq*tempo;o.type=['square','triangle','sawtooth','sine'][Math.floor(freq)%4];o.connect(g);g.connect(ctx.destination);g.gain.value=.05;o.start();g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.22);o.stop(ctx.currentTime+.24);if(el){el.style.transform='scale(1.06)';setTimeout(()=>el.style.transform='',120)}}pads.innerHTML=tones.map((t,i)=>'<button class="arcade-btn" style="height:160px;font-size:30px" data-tone="'+t+'" data-key="'+keys[i]+'">PAD '+(i+1)+'<br><small>KEY '+keys[i]+'</small></button>').join('');document.querySelectorAll('[data-tone]').forEach(btn=>btn.addEventListener('pointerdown',()=>{beep(Number(btn.dataset.tone),btn);retroWin(1,1,0,'rhythm')}));document.addEventListener('keydown',e=>{document.querySelectorAll('[data-tone]').forEach(btn=>{if(e.key===btn.dataset.key){beep(Number(btn.dataset.tone),btn);retroWin(1,1,0,'rhythm')}})});tempoUp.onclick=()=>{tempo=Math.min(2,tempo+.1);RetroState.show('TEMPO',tempo.toFixed(1)+'X','retro-ready',420)};tempoDown.onclick=()=>{tempo=Math.max(.5,tempo-.1);RetroState.show('TEMPO',tempo.toFixed(1)+'X','',420)};muteBtn.onclick=()=>{muted=!muted;RetroState.show(muted?'MUTED':'AUDIO ON',muted?'QUIET MODE':'LOUD MODE','',520)};</script></body></html>
