<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Rhythm Pads - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><div id='pads' style='display:grid;grid-template-columns:repeat(2,minmax(120px,1fr));gap:16px;max-width:520px;margin:auto'></div><p class='note'>Tap pads. Make noise. Pretend you're a nightclub goblin engineer.</p></div><script>retroHeader('RHYTHM PADS');const tones=[220,330,440,550];const ctx=new(window.AudioContext||window.webkitAudioContext)();function beep(freq){const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=freq;o.type='square';o.connect(g);g.connect(ctx.destination);g.gain.value=.05;o.start();g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.18);o.stop(ctx.currentTime+.2)}pads.innerHTML=tones.map((t,i)=>'<button class="arcade-btn" style="height:140px;font-size:28px" data-tone="'+t+'">PAD '+(i+1)+'</button>').join('');document.querySelectorAll('[data-tone]').forEach(btn=>btn.addEventListener('pointerdown',()=>{beep(Number(btn.dataset.tone));retroWin(1,1,0,'rhythm')}));</script></body></html>
