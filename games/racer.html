<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Racer - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='520' height='760'></canvas><p class='note'>Don't hit traffic cones from hell.</p></div><script>retroHeader('MINI RACER');const c=document.getElementById('game'),g=c.getContext('2d');let car=220,obs=[],score=0;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')car-=32;if(e.key==='ArrowRight')car+=32});setInterval(()=>obs.push({x:60+Math.random()*360,y:-40}),800);function loop(){g.fillStyle='#111';g.fillRect(0,0,520,760);g.fillStyle='#555';g.fillRect(100,0,320,760);g.fillStyle='#00ffcc';g.fillRect(car,650,60,90);obs.forEach(o=>{o.y+=8;g.fillStyle='#ff2bd6';g.fillRect(o.x,o.y,50,50);if(o.y>760){score++;retroWin(1,1,0)}});obs=obs.filter(o=>o.y<800);if(obs.some(o=>Math.abs(o.x-car)<50&&Math.abs(o.y-650)<60)){alert('CRASH')}g.fillStyle='#ffe66d';g.font='22px Arial';g.fillText('Score '+score,20,30);requestAnimationFrame(loop)}loop();</script></body></html>
