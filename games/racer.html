<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Racer - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='640' height='760'></canvas><div class='controls'><button id='startBtn'>START</button><button id='pauseBtn'>PAUSE</button><button id='resetBtn'>RESET RUN</button></div><p class='note'>Keyboard, WASD, touch buttons, swipe, drag, or controller-style taps. Real lanes, scaling speed, non-blocking crashes, and actual arcade flow.</p></div><div class='touch-controls'><div class='touch-pad-label'>RACER CONTROL DECK</div><div class='dpad'><button class='touch-btn left' id='leftBtn'>◀</button><button class='touch-btn center primary' id='brakeBtn'>BRAKE</button><button class='touch-btn right' id='rightBtn'>▶</button></div><div class='actions'><button class='touch-btn wide primary' id='touchStart'>START</button><button class='touch-btn wide' id='touchPause'>PAUSE</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('MINI RACER');const c=document.getElementById('game'),g=c.getContext('2d');const lanes=[116,216,316,416,516];let car,traffic,score,best,move,paused,running,crashed,speed,spawnTick,roadTick,combo,shake,lastTouch=null;function resetRun(){car={lane:2,x:316,y:642,w:54,h:86,vx:0};traffic=[];score=0;combo=0;move=0;speed=4;spawnTick=0;roadTick=0;paused=false;running=false;crashed=false;shake=0;RetroState.show('READY','START YOUR RUN','retro-ready',900)}function startRun(){if(crashed)resetRun();running=true;paused=false;RetroState.show('GO','STAY IN LANE','retro-ready',700)}function togglePause(){if(!running||crashed)return;paused=!paused;RetroState.show(paused?'PAUSED':'GO',paused?'PRESS START':'RACE','',600)}function steer(d){if(crashed)return;move=d;car.lane=Math.max(0,Math.min(lanes.length-1,car.lane+d));car.x=lanes[car.lane]}function brake(on){speed=on?Math.max(3,speed*.72):speed}function hit(a,b){return a.x-a.w/2<b.x+b.w/2&&a.x+a.w/2>b.x-b.w/2&&a.y<b.y+b.h&&a.y+a.h>b.y}function spawn(){let lane=Math.floor(Math.random()*lanes.length);let blocked=traffic.some(t=>t.lane===lane&&t.y<180);if(blocked)lane=(lane+1+Math.floor(Math.random()*4))%lanes.length;traffic.push({lane,x:lanes[lane],y:-120,w:58+Math.random()*16,h:82+Math.random()*26,c:['#ff2bd6','#00ffcc','#ffe66d','#7cff6b'][Math.floor(Math.random()*4)],v:speed+Math.random()*2})}function crash(){crashed=true;running=false;shake=18;retroWin(Math.floor(score/10),score,0,'racer');RetroState.show('CRASH','RESET TO RUN AGAIN','danger',1600);retroToast('CRASH - no alert box, because we are civilized now')}function update(){if(!running||paused||crashed)return;spawnTick++;roadTick+=speed;if(spawnTick>Math.max(18,58-score/7)){spawn();spawnTick=0}speed=Math.min(13,4+score/55);traffic.forEach(t=>t.y+=t.v+.4*Math.sin(score*.05));traffic=traffic.filter(t=>{if(t.y>830){score++;combo++;if(combo%8===0){retroWin(5,8,0,'racer');RetroState.show('CHAIN','COMBO '+combo,'bigwin',550)}return false}return true});if(traffic.some(t=>hit(car,t)))crash()}function drawRoad(){g.fillStyle='#050507';g.fillRect(-40,-40,720,840);g.fillStyle='#151722';g.fillRect(70,0,500,760);g.fillStyle='rgba(0,255,204,.18)';for(let x=170;x<570;x+=100)for(let y=-80+(roadTick%88);y<840;y+=88)g.fillRect(x-3,y,6,44);g.fillStyle='rgba(255,43,214,.18)';g.fillRect(58,0,10,760);g.fillRect(572,0,10,760)}function drawCar(x,y,w,h,color){g.fillStyle=color;g.fillRect(x-w/2,y,w,h);g.fillStyle='rgba(255,255,255,.35)';g.fillRect(x-w/2+10,y+10,w-20,18);g.fillStyle='rgba(0,0,0,.42)';g.fillRect(x-w/2+7,y+h-20,w-14,10)}function loop(){update();let ox=0,oy=0;if(shake>0){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake;shake*=.86}g.save();g.translate(ox,oy);drawRoad();traffic.forEach(t=>drawCar(t.x,t.y,t.w,t.h,t.c));drawCar(car.x,car.y,car.w,car.h,'#00ffcc');g.fillStyle='#ffe66d';g.font='bold 22px Arial';g.fillText('SCORE '+score,18,32);g.fillText('SPEED '+speed.toFixed(1),490,32);if(!running&&!crashed){g.font='bold 44px Arial';g.fillText('PRESS START',170,380)}if(paused){g.fillStyle='rgba(0,0,0,.55)';g.fillRect(0,0,640,760);g.fillStyle='#ffe66d';g.font='bold 48px Arial';g.fillText('PAUSED',220,380)}if(crashed){g.fillStyle='rgba(0,0,0,.58)';g.fillRect(0,0,640,760);g.fillStyle='#ff2bd6';g.font='bold 58px Arial';g.fillText('CRASH',205,370)}g.restore();requestAnimationFrame(loop)}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(leftBtn,()=>steer(-1),()=>move=0);bindHold(rightBtn,()=>steer(1),()=>move=0);bindHold(brakeBtn,()=>brake(true),()=>brake(false));startBtn.onclick=touchStart.onclick=startRun;pauseBtn.onclick=touchPause.onclick=togglePause;resetBtn.onclick=touchReset.onclick=resetRun;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')steer(-1);if(e.key==='ArrowRight'||e.key==='d')steer(1);if(e.key==='ArrowDown'||e.key==='s')brake(true);if(e.key===' '||e.key==='Enter')startRun();if(e.key==='p')togglePause();if(e.key==='r')resetRun()});document.addEventListener('keyup',e=>{if(e.key==='ArrowDown'||e.key==='s')brake(false)});c.addEventListener('pointermove',e=>{if(crashed)return;const r=c.getBoundingClientRect();const mx=((e.clientX-r.left)/r.width)*640;let nearest=lanes.reduce((best,x,i)=>Math.abs(mx-x)<Math.abs(mx-lanes[best])?i:best,0);car.lane=nearest;car.x=lanes[nearest]});c.addEventListener('pointerdown',e=>{lastTouch={x:e.clientX,y:e.clientY};if(!running&&!crashed)startRun()});c.addEventListener('pointerup',e=>{if(!lastTouch)return;const dx=e.clientX-lastTouch.x;if(dx>24)steer(1);if(dx<-24)steer(-1);lastTouch=null});resetRun();loop();</script></body></html>
