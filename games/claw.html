<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Claw - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='760' height='560'></canvas><div class='controls'><button onclick='resetPrizes()'>RESET PRIZES</button></div><p class='note'>Arrow keys, A/D, touch buttons, or drag. Drop the claw. Arcade fairness sold separately.</p></div><div class='touch-controls'><div class='touch-pad-label'>CLAW TOUCH CONTROLS</div><button class='touch-btn' id='leftBtn'>◀</button><button class='touch-btn wide' id='dropBtn'>DROP</button><button class='touch-btn' id='rightBtn'>▶</button></div><script>retroHeader('CLAW MACHINE');const c=document.getElementById('game'),g=c.getContext('2d');let claw=360,down=0,fall=false,rise=false,carry=null,move=0,prizes=[];function resetPrizes(){prizes=[];for(let i=0;i<10;i++)prizes.push({x:65+i*68,y:470,r:18,won:false,c:['#ff2bd6','#00ffcc','#ffe66d','#7cff6b'][i%4]});carry=null;down=0;fall=false;rise=false;retroToast('PRIZES RESET')}function drop(){if(!fall&&!rise){fall=true;down=0;carry=null}}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(leftBtn,()=>move=-1,()=>move=0);bindHold(rightBtn,()=>move=1,()=>move=0);dropBtn.addEventListener('pointerdown',drop);document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')move=-1;if(e.key==='ArrowRight'||e.key==='d')move=1;if(e.key===' ')drop()});document.addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))move=0});c.addEventListener('pointermove',e=>{if(fall||rise)return;const r=c.getBoundingClientRect();claw=((e.clientX-r.left)/r.width)*760;claw=Math.max(40,Math.min(720,claw))});function draw(){g.fillStyle='#050507';g.fillRect(0,0,760,560);g.strokeStyle='#00ffcc';g.lineWidth=4;g.strokeRect(30,30,700,480);g.fillStyle='rgba(0,255,204,.12)';g.fillRect(40,430,680,70);g.strokeStyle='#ffe66d';g.beginPath();g.moveTo(claw,40);g.lineTo(claw,80+down);g.stroke();g.strokeStyle='#00ffcc';g.strokeRect(claw-24,80+down,48,26);g.beginPath();g.moveTo(claw-18,106+down);g.lineTo(claw-34,132+down);g.moveTo(claw+18,106+down);g.lineTo(claw+34,132+down);g.stroke();prizes.forEach(p=>{if(!p.won){g.fillStyle=p.c;g.beginPath();g.arc(p.x,p.y,p.r,0,7);g.fill()}});if(carry){g.fillStyle=carry.c;g.beginPath();g.arc(claw,135+down,carry.r,0,7);g.fill()}g.fillStyle='#ffe66d';g.font='20px Arial';g.fillText('Prizes left '+prizes.filter(p=>!p.won).length,22,24)}function loop(){if(!fall&&!rise)claw=Math.max(40,Math.min(720,claw+move*6));if(fall){down+=8;if(down>=350){fall=false;rise=true;const p=prizes.find(p=>!p.won&&Math.abs(p.x-claw)<30);if(p&&Math.random()>.28){p.won=true;carry={...p};retroToast('GRAB!')}else retroToast('SO CLOSE. CLASSIC CRIME.')}}if(rise){down-=8;if(down<=0){down=0;rise=false;if(carry){retroWin(25,30,2,'claw');carry=null;if(prizes.every(p=>p.won)){retroWin(75,100,10,'claw');retroToast('MACHINE CLEARED')}}}}draw();requestAnimationFrame(loop)}resetPrizes();loop();</script></body></html>
