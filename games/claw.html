<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Claw - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='760' height='560'></canvas><div class='controls'><button onclick='drop()'>DROP CLAW</button></div><p class='note'>Move with arrows. Drop the claw. Arcade fairness sold separately.</p></div><script>retroHeader('CLAW MACHINE');const c=document.getElementById('game'),g=c.getContext('2d');let claw=360,down=0,fall=false,prizes=[];for(let i=0;i<10;i++)prizes.push({x:60+i*68,y:470,r:18,won:false});document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')claw=Math.max(30,claw-24);if(e.key==='ArrowRight')claw=Math.min(730,claw+24);if(e.key===' ')drop()});function drop(){if(!fall){fall=true;down=0}}function loop(){g.fillStyle='#050507';g.fillRect(0,0,760,560);g.strokeStyle='#00ffcc';g.lineWidth=4;g.strokeRect(30,30,700,480);g.beginPath();g.moveTo(claw,40);g.lineTo(claw,80+down);g.stroke();g.strokeRect(claw-22,80+down,44,24);g.fillStyle='#ff2bd6';prizes.forEach(p=>{if(!p.won){g.beginPath();g.arc(p.x,p.y,p.r,0,7);g.fill()}});if(fall){down+=8;if(down>380){fall=false;let p=prizes.find(p=>!p.won&&Math.abs(p.x-claw)<28);if(p&&Math.random()>.35){p.won=true;retroWin(25,30,2);alert('PRIZE WON!')}else alert('SO CLOSE. CLASSIC CRIME.')}}requestAnimationFrame(loop)}loop();</script></body></html>
