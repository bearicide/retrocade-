<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Claw - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='760' height='560'></canvas><div class='controls'><button id='startBtn'>START</button><button id='pauseBtn'>PAUSE</button><button id='resetBtn'>RESET PRIZES</button></div><p class='note'>Keyboard, drag, touch deck, smoother claw flow, and fairer prize grabs. Arcade fairness improved slightly by court order.</p></div><div class='touch-controls'><div class='touch-pad-label'>CLAW CONTROL DECK</div><div class='dpad'><button class='touch-btn left' id='leftBtn'>◀</button><button class='touch-btn center primary' id='dropBtn'>DROP</button><button class='touch-btn right' id='rightBtn'>▶</button></div><div class='actions'><button class='touch-btn wide primary' id='touchStart'>START</button><button class='touch-btn wide' id='touchPause'>PAUSE</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('CLAW MACHINE');const c=document.getElementById('game'),g=c.getContext('2d');let claw,down,fall,rise,carry,move,prizes,running,paused,score,shake,lastTouch=null;function resetPrizes(){claw=360;down=0;fall=false;rise=false;carry=null;move=0;running=false;paused=false;score=0;shake=0;prizes=[];for(let i=0;i<10;i++)prizes.push({x:65+i*68,y:470,r:18,won:false,bob:Math.random()*7,c:['#ff2bd6','#00ffcc','#ffe66d','#7cff6b'][i%4]});RetroState.show('READY','START THE MACHINE','retro-ready',900)}function start(){running=true;paused=false;RetroState.show('GO','GRAB A PRIZE','retro-ready',650)}function togglePause(){if(!running)return;paused=!paused;RetroState.show(paused?'PAUSED':'GO',paused?'PRESS START':'PLAY','',520)}function drop(){if(!running)start();if(!fall&&!rise){fall=true;down=0;carry=null;RetroState.show('DROP','CLAW DEPLOYED','',420)}}function update(){if(!running||paused)return;if(!fall&&!rise)claw=Math.max(40,Math.min(720,claw+move*5.5));if(fall){down+=7.5;if(down>=350){fall=false;rise=true;const candidates=prizes.filter(p=>!p.won&&Math.abs(p.x-claw)<34);const p=candidates.sort((a,b)=>Math.abs(a.x-claw)-Math.abs(b.x-claw))[0];if(p&&Math.random()>.18){p.won=true;carry={...p};retroToast('GRAB!');RetroState.show('CAUGHT','NICE PULL','bigwin',700);retroWin(20,30,2,'claw')}else{RetroState.show('MISS','SO CLOSE','danger',520)}}}if(rise){down-=7.5;if(down<=0){down=0;rise=false;if(carry){score++;shake=8;retroWin(40,55,5,'claw');carry=null;if(prizes.every(p=>p.won)){running=false;retroWin(100,160,15,'claw');RetroState.show('CLEARED','ALL PRIZES WON','bigwin',1600)}}}}}function draw(){let ox=0,oy=0;if(shake>0){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake;shake*=.84}g.save();g.translate(ox,oy);g.fillStyle='#050507';g.fillRect(0,0,760,560);g.strokeStyle='#00ffcc';g.lineWidth=4;g.shadowBlur=12;g.shadowColor='#00ffcc';g.strokeRect(30,30,700,480);g.shadowBlur=0;g.fillStyle='rgba(0,255,204,.12)';g.fillRect(40,430,680,70);g.strokeStyle='#ffe66d';g.lineWidth=3;g.beginPath();g.moveTo(claw,40);g.lineTo(claw,80+down);g.stroke();g.strokeStyle='#00ffcc';g.strokeRect(claw-24,80+down,48,26);g.beginPath();g.moveTo(claw-18,106+down);g.lineTo(claw-34,132+down);g.moveTo(claw+18,106+down);g.lineTo(claw+34,132+down);g.stroke();prizes.forEach(p=>{if(!p.won){p.bob+=.03;g.fillStyle=p.c;g.shadowBlur=10;g.shadowColor=p.c;g.beginPath();g.arc(p.x,p.y+Math.sin(p.bob)*3,p.r,0,7);g.fill();g.shadowBlur=0}});if(carry){g.fillStyle=carry.c;g.shadowBlur=16;g.shadowColor=carry.c;g.beginPath();g.arc(claw,135+down,carry.r,0,7);g.fill();g.shadowBlur=0}g.fillStyle='#ffe66d';g.font='bold 22px Arial';g.fillText('PRIZES '+score+'/10',20,30);if(!running){g.font='bold 42px Arial';g.fillText('PRESS START',220,285)}if(paused){g.fillStyle='rgba(0,0,0,.56)';g.fillRect(0,0,760,560);g.fillStyle='#ffe66d';g.font='bold 50px Arial';g.fillText('PAUSED',255,285)}g.restore();requestAnimationFrame(loop)}function loop(){update();draw()}function bindHold(btn,on,off){btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointerleave',off);btn.addEventListener('pointercancel',off)}bindHold(leftBtn,()=>move=-1,()=>move=0);bindHold(rightBtn,()=>move=1,()=>move=0);dropBtn.addEventListener('pointerdown',drop);startBtn.onclick=touchStart.onclick=start;pauseBtn.onclick=touchPause.onclick=togglePause;resetBtn.onclick=touchReset.onclick=resetPrizes;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')move=-1;if(e.key==='ArrowRight'||e.key==='d')move=1;if(e.key===' '||e.key==='Enter')drop();if(e.key==='p')togglePause();if(e.key==='r')resetPrizes()});document.addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))move=0});c.addEventListener('pointermove',e=>{if(fall||rise)return;const r=c.getBoundingClientRect();claw=((e.clientX-r.left)/r.width)*760;claw=Math.max(40,Math.min(720,claw))});c.addEventListener('pointerdown',e=>{lastTouch={x:e.clientX,y:e.clientY};if(!running)start()});c.addEventListener('pointerup',e=>{if(!lastTouch)return;const dx=e.clientX-lastTouch.x;if(dx>24)move=1;if(dx<-24)move=-1;setTimeout(()=>move=0,110);lastTouch=null});resetPrizes();loop();</script></body></html>
