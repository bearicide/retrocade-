<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Memory - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><div id='board' style='display:grid;grid-template-columns:repeat(4,90px);gap:12px;justify-content:center;margin:30px auto'></div><p class='note'>Match the neon pairs. Memory is just anxiety with storage.</p></div><script>retroHeader('MEMORY MATCH');let icons=['👾','🎮','🕹️','🎟️','🪙','⚡','💾','🌈'];let deck=[...icons,...icons].sort(()=>Math.random()-.5),open=[],matched=0;function draw(){board.innerHTML=deck.map((v,i)=>'<button class="arcade-btn" style="height:90px;font-size:34px" onclick="flip('+i+')" id="c'+i+'">?</button>').join('')}function flip(i){let el=document.getElementById('c'+i);if(open.includes(i)||el.dataset.done)return;el.textContent=deck[i];open.push(i);if(open.length===2){let a=open[0],b=open[1];if(deck[a]===deck[b]){document.getElementById('c'+a).dataset.done=1;document.getElementById('c'+b).dataset.done=1;matched+=2;retroWin(5,8,1);open=[];if(matched===deck.length){retroWin(40,80,5);alert('MEMORY CLEARED')}}else setTimeout(()=>{document.getElementById('c'+a).textContent='?';document.getElementById('c'+b).textContent='?';open=[]},650)}}draw();</script></body></html>
