<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Memory - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><div class='controls'><button id='startBtn'>START</button><button id='resetBtn'>RESET BOARD</button><button id='hintBtn'>HINT</button></div><div id='board' style='display:grid;grid-template-columns:repeat(4,minmax(78px,112px));gap:14px;justify-content:center;margin:22px auto;max-width:540px'></div><p class='note'>Match neon pairs. Keyboard 1-16, touch, mouse, and reset/hint controls. Memory is anxiety with storage.</p></div><div class='touch-controls'><div class='touch-pad-label'>MEMORY CONTROL DECK</div><div class='actions'><button class='touch-btn wide primary' id='touchStart'>START</button><button class='touch-btn wide' id='touchHint'>HINT</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('MEMORY MATCH');let icons=['👾','🎮','🕹️','🎟️','🪙','⚡','💾','🌈'];let deck=[],open=[],matchedSet=new Set(),moves=0,running=false,locked=false,hinting=false;function shuffle(){deck=[...icons,...icons].sort(()=>Math.random()-.5);open=[];matchedSet=new Set();moves=0;locked=false;hinting=false}function startGame(){running=true;RetroState.show('READY','MATCH THE SIGNAL','retro-ready',700);draw()}function resetGame(){shuffle();running=false;draw();RetroState.show('RESET','BOARD READY','',700)}function draw(){board.innerHTML=deck.map((v,i)=>{const shown=open.includes(i)||matchedSet.has(i);const done=matchedSet.has(i)?' data-done="1"':'';return '<button class="arcade-btn" style="height:104px;font-size:38px" data-card="'+i+'" id="c'+i+'" aria-label="Memory card '+(i+1)+'"'+done+'>'+(shown?deck[i]:'?')+'</button>'}).join('');document.querySelectorAll('[data-card]').forEach(btn=>btn.addEventListener('pointerdown',()=>flip(Number(btn.dataset.card))))}function flip(i){if(i<0||i>=deck.length)return;if(!running)startGame();if(locked||open.includes(i)||matchedSet.has(i))return;open.push(i);draw();if(open.length===2){moves++;locked=true;let a=open[0],b=open[1];if(deck[a]===deck[b]){setTimeout(()=>{matchedSet.add(a);matchedSet.add(b);open=[];locked=false;retroWin(5,8,1,'memory');RetroState.show('MATCH','MOVES '+moves,'bigwin',520);draw();if(matchedSet.size===deck.length){running=false;retroWin(50,90,8,'memory');RetroState.show('CLEARED','MEMORY RESTORED','bigwin',1500)}},220)}else{setTimeout(()=>{open=[];locked=false;RetroState.show('NO MATCH','TRY AGAIN','',420);draw()},650)}}}function hint(){if(hinting||locked)return;hinting=true;const available=[...document.querySelectorAll('[data-card]')].filter(el=>!matchedSet.has(Number(el.dataset.card)));available.forEach(el=>el.textContent=deck[Number(el.dataset.card)]);RetroState.show('HINT','LOOK FAST','retro-ready',600);setTimeout(()=>{hinting=false;draw()},700)}startBtn.onclick=touchStart.onclick=startGame;resetBtn.onclick=touchReset.onclick=resetGame;hintBtn.onclick=touchHint.onclick=hint;document.addEventListener('keydown',e=>{const n=parseInt(e.key,10);if(n>=1&&n<=9)flip(n-1);if(e.key==='0')flip(9);if(e.key==='q')flip(10);if(e.key==='w')flip(11);if(e.key==='e')flip(12);if(e.key==='r')flip(13);if(e.key==='t')flip(14);if(e.key==='y')flip(15);if(e.key==='h')hint();if(e.key==='Enter'||e.key===' ')startGame();if(e.key==='Escape')resetGame()});shuffle();draw();</script></body></html>
