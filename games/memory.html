<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>Memory Match | RETROCADE</title>
<style>
:root{--bg:#090d18;--panel:rgba(18,25,45,.72);--panel2:rgba(255,255,255,.08);--ink:#f7f8ff;--muted:#aeb8d2;--line:rgba(255,255,255,.12);--accent:#7c5cff;--accent2:#21d4fd;--good:#6ee7b7;--warn:#fbbf24;--shadow:0 24px 80px rgba(0,0,0,.42)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 12% 10%,rgba(124,92,255,.24),transparent 34rem),radial-gradient(circle at 88% 8%,rgba(33,212,253,.18),transparent 30rem),linear-gradient(180deg,#0d1222,#090d18 60%,#05070d);color:var(--ink)}
body{padding:18px;overflow-x:hidden}.app{width:min(1120px,100%);margin:0 auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.back{color:var(--ink);text-decoration:none;font-weight:800;letter-spacing:.04em}.pill{padding:9px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.06);color:var(--muted);font-size:.85rem;font-weight:750}
.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;align-items:stretch;margin-bottom:18px}.hero-copy,.stats{border:1px solid var(--line);border-radius:28px;background:var(--panel);backdrop-filter:blur(18px);box-shadow:var(--shadow)}.hero-copy{padding:28px}.eyebrow{display:inline-flex;align-items:center;gap:8px;color:var(--accent2);font-size:.78rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase}.hero h1{margin:10px 0 8px;font-size:clamp(2.4rem,8vw,5.6rem);line-height:.92;letter-spacing:-.055em}.hero p{margin:0;color:var(--muted);font-size:1rem;line-height:1.55;max-width:42rem}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px}.stat{min-height:112px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.045);padding:16px;display:flex;flex-direction:column;justify-content:space-between}.stat span{color:var(--muted);font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em}.stat strong{font-size:clamp(1.7rem,5vw,2.8rem);letter-spacing:-.04em}
.game-shell{position:relative;border:1px solid var(--line);border-radius:30px;background:rgba(11,16,32,.78);box-shadow:var(--shadow);padding:18px;overflow:hidden}.game-shell:before{content:"";position:absolute;inset:-30% auto auto -10%;width:55%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,rgba(124,92,255,.22),transparent 65%);pointer-events:none}.toolbar{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.toolbar-copy strong{display:block;font-size:1rem}.toolbar-copy span{display:block;color:var(--muted);font-size:.88rem;margin-top:3px}.buttons{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);border-radius:14px;padding:11px 15px;background:rgba(255,255,255,.07);color:var(--ink);font-weight:850;cursor:pointer;transition:.18s ease}.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.11)}.btn.primary{background:linear-gradient(135deg,var(--accent),#5a7cff);border-color:transparent;box-shadow:0 12px 28px rgba(124,92,255,.28)}
.board{position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{position:relative;aspect-ratio:1.2;border:0;padding:0;background:none;cursor:pointer;perspective:900px}.card-inner{position:absolute;inset:0;transition:transform .48s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d}.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--line);display:flex;align-items:center;justify-content:center}.front{background:linear-gradient(145deg,rgba(124,92,255,.18),rgba(33,212,253,.08)),rgba(255,255,255,.05);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 12px 24px rgba(0,0,0,.18)}.front:after{content:"✦";font-size:clamp(1.6rem,5vw,3rem);color:rgba(255,255,255,.72)}.back{transform:rotateY(180deg);background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.06));box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 14px 30px rgba(0,0,0,.25)}.symbol{font-size:clamp(2rem,7vw,4.2rem);filter:drop-shadow(0 10px 18px rgba(0,0,0,.25))}.card.matched .back{border-color:rgba(110,231,183,.6);box-shadow:0 0 0 2px rgba(110,231,183,.15),0 18px 34px rgba(0,0,0,.24)}.card:focus-visible{outline:3px solid var(--accent2);outline-offset:4px;border-radius:24px}
.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;pointer-events:none;padding:12px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(12,18,34,.92);backdrop-filter:blur(16px);font-weight:850;box-shadow:var(--shadow);transition:.22s ease;z-index:20}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:760px){body{padding:10px}.hero{grid-template-columns:1fr}.hero-copy{padding:22px}.stats{grid-template-columns:repeat(4,1fr)}.stat{min-height:82px;padding:12px}.stat strong{font-size:1.55rem}.game-shell{padding:12px;border-radius:22px}.toolbar{align-items:flex-start;flex-direction:column}.board{gap:9px}.face{border-radius:15px}.btn{padding:10px 12px}.pill{display:none}}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}.board{gap:7px}.hero h1{font-size:3rem}.front:after{font-size:1.5rem}.symbol{font-size:2.2rem}}
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <a class="back" href="../index.html">← RETROCADE</a>
    <span class="pill">MATTBEAR / MEMORY MATCH</span>
  </header>

  <section class="hero">
    <div class="hero-copy">
      <span class="eyebrow">Focus Mode • 16 Cards</span>
      <h1>Memory Match</h1>
      <p>Flip two cards. Find every pair. Build a streak without turning this into a fake arcade cabinet from 1993.</p>
    </div>
    <div class="stats" aria-label="Game statistics">
      <div class="stat"><span>Moves</span><strong id="moves">0</strong></div>
      <div class="stat"><span>Pairs</span><strong id="pairs">0/8</strong></div>
      <div class="stat"><span>Streak</span><strong id="streak">0</strong></div>
      <div class="stat"><span>Best</span><strong id="best">—</strong></div>
    </div>
  </section>

  <section class="game-shell">
    <div class="toolbar">
      <div class="toolbar-copy"><strong>Match all eight pairs</strong><span>Cards lock when matched. A clean run uses fewer moves.</span></div>
      <div class="buttons"><button class="btn" id="shuffleBtn" type="button">Shuffle</button><button class="btn primary" id="newBtn" type="button">New Game</button></div>
    </div>
    <div class="board" id="board" aria-label="Memory card grid"></div>
  </section>
</main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
(()=>{
  const icons=['🐻','🌈','🎛️','🎧','⚡','🛸','🧠','🎟️'];
  const board=document.getElementById('board');
  const movesEl=document.getElementById('moves');
  const pairsEl=document.getElementById('pairs');
  const streakEl=document.getElementById('streak');
  const bestEl=document.getElementById('best');
  const toast=document.getElementById('toast');
  let deck=[],open=[],matched=new Set(),moves=0,streak=0,locked=false;
  const best=Number(localStorage.getItem('retrocade-memory-best')||0);
  bestEl.textContent=best||'—';

  function shuffle(items){for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]]}return items}
  function notify(text){toast.textContent=text;toast.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>toast.classList.remove('show'),1300)}
  function updateStats(){movesEl.textContent=moves;pairsEl.textContent=(matched.size/2)+'/8';streakEl.textContent=streak}
  function render(){board.innerHTML='';deck.forEach((value,index)=>{const card=document.createElement('button');card.type='button';card.className='card';card.setAttribute('aria-label','Hidden memory card');card.innerHTML='<span class="card-inner"><span class="face front"></span><span class="face back"><span class="symbol">'+value+'</span></span></span>';if(open.includes(index))card.classList.add('flipped');if(matched.has(index)){card.classList.add('matched');card.setAttribute('aria-label','Matched '+value)}card.addEventListener('click',()=>flip(index));board.appendChild(card)})}
  function start(){deck=shuffle([...icons,...icons]);open=[];matched=new Set();moves=0;streak=0;locked=false;updateStats();render()}
  function flip(index){if(locked||matched.has(index)||open.includes(index))return;open.push(index);render();if(open.length<2)return;moves++;locked=true;const[a,b]=open;if(deck[a]===deck[b]){matched.add(a);matched.add(b);streak++;open=[];locked=false;updateStats();render();notify(streak>1?'Streak x'+streak:'Pair matched');if(matched.size===deck.length){const previous=Number(localStorage.getItem('retrocade-memory-best')||0);if(!previous||moves<previous){localStorage.setItem('retrocade-memory-best',moves);bestEl.textContent=moves;notify('New best: '+moves+' moves')}else notify('Board cleared in '+moves+' moves')}}else{streak=0;updateStats();setTimeout(()=>{open=[];locked=false;render()},650)}}
  document.getElementById('newBtn').addEventListener('click',start);
  document.getElementById('shuffleBtn').addEventListener('click',()=>{if(matched.size){notify('Start a new game to reshuffle');return}deck=shuffle(deck);render();notify('Shuffled')});
  start();
})();
</script>
</body>
</html>
