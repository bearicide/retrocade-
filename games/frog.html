<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Frog Dash - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='640' height='640'></canvas><div class='controls'><button onclick='resetGame()'>RESET FROG</button></div><p class='note'>Arrow keys, WASD, swipe, or touch buttons. Cross the road. Fear rectangles professionally.</p></div><div class='touch-controls'><div class='touch-pad-label'>FROG DASH TOUCH CONTROLS</div><div><button class='touch-btn' data-move='up'>▲</button></div><div><button class='touch-btn' data-move='left'>◀</button><button class='touch-btn wide' onclick='resetGame()'>RESET</button><button class='touch-btn' data-move='right'>▶</button></div><div><button class='touch-btn' data-move='down'>▼</button></div></div><script>retroHeader('FROG DASH');const c=document.getElementById('game'),g=c.getContext('2d');let frog,cars,score,alive,lastSpawn=0,lastTouch=null;function resetGame(){frog={x:300,y:580,w:40,h:40};cars=[];score=0;alive=true;lastSpawn=0;retroToast('FROG READY')}function moveFrog(dir){if(!alive)return;if(dir==='up')frog.y-=40;if(dir==='down')frog.y+=40;if(dir==='left')frog.x-=40;if(dir==='right')frog.x+=40;frog.x=Math.max(0,Math.min(600,frog.x));frog.y=Math.max(20,Math.min(580,frog.y))}function rectHit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w')moveFrog('up');if(e.key==='ArrowDown'||e.key==='s')moveFrog('down');if(e.key==='ArrowLeft'||e.key==='a')moveFrog('left');if(e.key==='ArrowRight'||e.key==='d')moveFrog('right')});document.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('pointerdown',()=>moveFrog(b.dataset.move)));c.addEventListener('pointerdown',e=>{lastTouch={x:e.clientX,y:e.clientY}});c.addEventListener('pointerup',e=>{if(!lastTouch)return;const dx=e.clientX-lastTouch.x,dy=e.clientY-lastTouch.y;if(Math.abs(dx)>Math.abs(dy))moveFrog(dx>0?'right':'left');else moveFrog(dy>0?'down':'up');lastTouch=null});function spawn(){const lanes=[100,160,220,280,340,400,460,520];const lane=lanes[Math.floor(Math.random()*lanes.length)];const fromLeft=Math.random()>.5;cars.push({x:fromLeft?-90:730,y:lane,w:82,h:34,v:(fromLeft?1:-1)*(3+Math.random()*4),c:['#ff2bd6','#00ffcc','#ffe66d','#7cff6b'][Math.floor(Math.random()*4)]})}function loop(t){if(alive&&t-lastSpawn>520){spawn();lastSpawn=t}g.fillStyle='#102010';g.fillRect(0,0,640,640);g.fillStyle='#252833';g.fillRect(0,70,640,500);g.fillStyle='rgba(255,255,255,.1)';for(let y=100;y<560;y+=60)g.fillRect(0,y,640,2);cars.forEach(ca=>{if(alive)ca.x+=ca.v;g.fillStyle=ca.c;g.fillRect(ca.x,ca.y,ca.w,ca.h)});cars=cars.filter(ca=>ca.x>-130&&ca.x<770);g.fillStyle='#7cff6b';g.fillRect(frog.x,frog.y,frog.w,frog.h);if(alive&&cars.some(ca=>rectHit(frog,ca))){alive=false;retroWin(Math.floor(score/2),score*4,0,'frog');retroToast('ROADKILL - reset frog')}if(alive&&frog.y<=30){score++;retroWin(10,18,2,'frog');retroToast('CROSSING CLEAR +' + score);frog.x=300;frog.y=580}g.fillStyle='#ffe66d';g.font='22px Arial';g.fillText('Crossings '+score,20,32);if(!alive){g.font='34px Arial';g.fillText('SPLAT',270,330)}requestAnimationFrame(loop)}resetGame();requestAnimationFrame(loop);</script></body></html>
