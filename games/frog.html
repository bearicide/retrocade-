<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08131a">
<title>Frog Cross | RETROCADE</title>
<style>
:root{--bg:#071017;--panel:rgba(13,28,38,.78);--ink:#f4fbff;--muted:#9db3c2;--line:rgba(255,255,255,.12);--green:#54e58b;--cyan:#38d9ff;--yellow:#ffd166;--danger:#ff667d;--shadow:0 24px 80px rgba(0,0,0,.42)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 12% 8%,rgba(84,229,139,.18),transparent 30rem),radial-gradient(circle at 88% 12%,rgba(56,217,255,.14),transparent 30rem),linear-gradient(180deg,#0a1820,#071017 65%,#04090d);color:var(--ink)}
body{padding:16px;overflow-x:hidden}.app{width:min(1120px,100%);margin:0 auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.back{color:var(--ink);text-decoration:none;font-weight:850}.pill{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.05);color:var(--muted);font-size:.82rem;font-weight:800}
.hero{display:grid;grid-template-columns:1.25fr .75fr;gap:16px;margin-bottom:16px}.hero-copy,.stats,.game-shell{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(18px);box-shadow:var(--shadow)}.hero-copy{padding:26px;border-radius:28px}.eyebrow{color:var(--green);font-size:.76rem;font-weight:950;letter-spacing:.14em;text-transform:uppercase}.hero h1{margin:8px 0 7px;font-size:clamp(2.5rem,8vw,5.4rem);line-height:.92;letter-spacing:-.055em}.hero p{margin:0;color:var(--muted);line-height:1.5}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;padding:12px;border-radius:28px}.stat{min-height:92px;padding:14px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045);display:flex;flex-direction:column;justify-content:space-between}.stat span{color:var(--muted);font-size:.72rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase}.stat strong{font-size:clamp(1.55rem,5vw,2.5rem)}
.game-shell{padding:14px;border-radius:28px}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.status strong{display:block}.status span{display:block;color:var(--muted);font-size:.86rem;margin-top:3px}.buttons{display:flex;gap:8px}.btn{border:1px solid var(--line);border-radius:13px;padding:10px 14px;background:rgba(255,255,255,.07);color:var(--ink);font-weight:850;cursor:pointer}.btn.primary{background:linear-gradient(135deg,var(--green),#1dbd74);color:#032314;border-color:transparent}
.canvas-wrap{position:relative;overflow:hidden;border-radius:22px;border:1px solid var(--line);background:#071017}.canvas-wrap canvas{display:block;width:100%;height:auto;aspect-ratio:4/3;touch-action:none}.hint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);padding:12px 16px;border-radius:999px;background:rgba(4,12,17,.82);border:1px solid var(--line);font-weight:900;white-space:nowrap;pointer-events:none;transition:.2s}.hint.hidden{opacity:0;transform:translate(-50%,-42%)}
.controls{display:grid;grid-template-columns:repeat(3,64px);grid-template-rows:repeat(3,58px);gap:7px;justify-content:center;margin:14px auto 2px}.move{border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.07);color:var(--ink);font-size:1.35rem;font-weight:950;touch-action:manipulation}.move:active{transform:translateY(2px);background:rgba(84,229,139,.18)}.up{grid-column:2}.left{grid-column:1;grid-row:2}.right{grid-column:3;grid-row:2}.down{grid-column:2;grid-row:3}.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,18px);opacity:0;padding:11px 15px;border:1px solid var(--line);border-radius:999px;background:rgba(5,15,21,.94);font-weight:900;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:760px){body{padding:9px}.hero{grid-template-columns:1fr}.hero-copy{padding:21px}.stats{grid-template-columns:repeat(4,1fr)}.stat{min-height:76px;padding:10px}.stat strong{font-size:1.45rem}.toolbar{align-items:flex-start;flex-direction:column}.pill{display:none}.game-shell{padding:10px;border-radius:22px}.canvas-wrap{border-radius:16px}}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:3rem}.controls{grid-template-columns:repeat(3,58px);grid-template-rows:repeat(3,53px)}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><a class="back" href="../index.html">← RETROCADE</a><span class="pill">MATTBEAR / FROG CROSS</span></header>
<section class="hero">
<div class="hero-copy"><span class="eyebrow">Traffic Run • Tap to Start</span><h1>Frog Cross</h1><p>Choose a direction to begin. Traffic keeps moving until you pause, reset, cross, or get hit.</p></div>
<div class="stats"><div class="stat"><span>Crossings</span><strong id="crossings">0</strong></div><div class="stat"><span>Lives</span><strong id="lives">3</strong></div><div class="stat"><span>Tickets</span><strong id="tickets">0</strong></div><div class="stat"><span>Status</span><strong id="status">Paused</strong></div></div>
</section>
<section class="game-shell">
<div class="toolbar"><div class="status"><strong>Reach the bright lane</strong><span>Arrow keys, WASD, swipe, or the buttons below.</span></div><div class="buttons"><button class="btn" id="pauseBtn" type="button">Pause</button><button class="btn primary" id="resetBtn" type="button">Reset</button></div></div>
<div class="canvas-wrap"><canvas id="game" width="800" height="600" aria-label="Frog Cross game"></canvas><div class="hint" id="hint">Move to start</div></div>
<div class="controls" aria-label="Movement controls"><button class="move up" data-dir="up">▲</button><button class="move left" data-dir="left">◀</button><button class="move right" data-dir="right">▶</button><button class="move down" data-dir="down">▼</button></div>
</section>
</main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
(()=>{
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W=800,H=600;
const crossingsEl=document.getElementById('crossings'),livesEl=document.getElementById('lives'),ticketsEl=document.getElementById('tickets'),statusEl=document.getElementById('status'),hint=document.getElementById('hint'),toast=document.getElementById('toast');
let frog,cars=[],running=false,paused=true,lives=3,crossings=0,tickets=0,last=0,spawnTimer=0,invincible=0;
const lanes=[130,195,260,325,390,455];
function resetFrog(){frog={x:382,y:535,w:36,h:36}}
function reset(){cars=[];running=false;paused=true;lives=3;crossings=0;tickets=0;spawnTimer=0;invincible=.7;resetFrog();updateHud();hint.classList.remove('hidden');draw()}
function updateHud(){crossingsEl.textContent=crossings;livesEl.textContent=lives;ticketsEl.textContent=tickets;statusEl.textContent=!running?'Paused':paused?'Paused':'Running'}
function ticket(amount){tickets+=amount;try{const key='retrocadeState',s=JSON.parse(localStorage.getItem(key)||'{}');s.tickets=(s.tickets||0)+amount;s.plays=(s.plays||0)+1;localStorage.setItem(key,JSON.stringify(s))}catch(e){}toast.textContent='+'+amount+' tickets';toast.classList.add('show');clearTimeout(window.__frogToast);window.__frogToast=setTimeout(()=>toast.classList.remove('show'),1100);updateHud()}
function begin(){if(!running){running=true;paused=false;hint.classList.add('hidden')}else if(paused){paused=false}updateHud()}
function move(dir){begin();const step=52;if(dir==='left')frog.x-=step;if(dir==='right')frog.x+=step;if(dir==='up')frog.y-=step;if(dir==='down')frog.y+=step;frog.x=Math.max(8,Math.min(W-frog.w-8,frog.x));frog.y=Math.max(15,Math.min(H-frog.h-15,frog.y));if(frog.y<55){crossings++;ticket(8);resetFrog();invincible=.65}}
function spawn(){const lane=lanes[Math.floor(Math.random()*lanes.length)],fromLeft=Math.random()>.5,speed=(2.8+Math.random()*2.8)*(fromLeft?1:-1);cars.push({x:fromLeft?-110:W+30,y:lane,w:88,h:38,v:speed,color:['#ff667d','#ffd166','#38d9ff','#9b87f5'][Math.floor(Math.random()*4)]})}
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function update(dt){if(!running||paused)return;if(invincible>0)invincible-=dt;spawnTimer+=dt;if(spawnTimer>.62){spawn();spawnTimer=0}cars.forEach(c=>c.x+=c.v);cars=cars.filter(c=>c.x>-150&&c.x<W+150);if(invincible<=0&&cars.some(c=>hit(frog,c))){lives--;resetFrog();invincible=.8;if(lives<=0){running=false;paused=true;lives=3;crossings=0;cars=[];hint.textContent='Move to restart';hint.classList.remove('hidden')}updateHud()}}
function roundRect(x,y,w,h,r,fill){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill()}
function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#08151c';ctx.fillRect(0,0,W,H);ctx.fillStyle='#173f36';ctx.fillRect(0,0,W,72);ctx.fillStyle='#1d5b49';ctx.fillRect(0,528,W,72);ctx.fillStyle='#16242c';ctx.fillRect(0,82,W,436);for(let i=0;i<lanes.length;i++){ctx.fillStyle=i%2?'#1a2b34':'#14252d';ctx.fillRect(0,lanes[i]-12,W,58);ctx.fillStyle='rgba(255,255,255,.13)';for(let x=(i%2)*45;x<W;x+=110)ctx.fillRect(x,lanes[i]+14,55,4)}ctx.fillStyle='#54e58b';ctx.fillRect(0,45,W,6);cars.forEach(c=>{roundRect(c.x,c.y,c.w,c.h,12,c.color);ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillRect(c.x+16,c.y+7,22,9);ctx.fillRect(c.x+50,c.y+7,22,9);ctx.fillStyle='#071017';ctx.beginPath();ctx.arc(c.x+20,c.y+38,8,0,Math.PI*2);ctx.arc(c.x+68,c.y+38,8,0,Math.PI*2);ctx.fill()});ctx.save();ctx.globalAlpha=invincible>0?.55:1;ctx.fillStyle='#54e58b';ctx.beginPath();ctx.ellipse(frog.x+18,frog.y+19,19,16,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#d8ffe8';ctx.beginPath();ctx.arc(frog.x+11,frog.y+10,5,0,Math.PI*2);ctx.arc(frog.x+25,frog.y+10,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#071017';ctx.beginPath();ctx.arc(frog.x+11,frog.y+10,2,0,Math.PI*2);ctx.arc(frog.x+25,frog.y+10,2,0,Math.PI*2);ctx.fill();ctx.restore();if(paused&&running){ctx.fillStyle='rgba(3,10,14,.46)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='800 34px system-ui';ctx.textAlign='center';ctx.fillText('Paused',W/2,H/2)}}
function loop(t){const dt=Math.min(.04,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}
function keyDir(k){return({arrowup:'up',w:'up',arrowdown:'down',s:'down',arrowleft:'left',a:'left',arrowright:'right',d:'right'})[k]}
document.addEventListener('keydown',e=>{const dir=keyDir(e.key.toLowerCase());if(dir){e.preventDefault();move(dir)}});
document.querySelectorAll('[data-dir]').forEach(btn=>btn.addEventListener('pointerdown',e=>{e.preventDefault();move(btn.dataset.dir)}));
let sx=0,sy=0;canvas.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY});canvas.addEventListener('pointerup',e=>{const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.max(Math.abs(dx),Math.abs(dy))<18)return;move(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'))});
document.getElementById('pauseBtn').addEventListener('click',()=>{if(!running)return;paused=!paused;updateHud()});document.getElementById('resetBtn').addEventListener('click',reset);
reset();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
