<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Frog Dash - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='640' height='640'></canvas><div class='controls'><button id='startBtn'>START</button><button id='pauseBtn'>PAUSE</button><button id='resetBtn'>RESET FROG</button></div><p class='note'>Keyboard, WASD, swipe, touch deck, and better crossing rhythm. Cross the road. Fear rectangles professionally.</p></div><div class='touch-controls'><div class='touch-pad-label'>FROG DASH CONTROL DECK</div><div class='dpad'><button class='touch-btn up' data-move='up'>▲</button><button class='touch-btn left' data-move='left'>◀</button><button class='touch-btn center primary' id='hopBtn'>HOP</button><button class='touch-btn right' data-move='right'>▶</button><button class='touch-btn down' data-move='down'>▼</button></div><div class='actions'><button class='touch-btn wide primary' id='touchStart'>START</button><button class='touch-btn wide' id='touchPause'>PAUSE</button><button class='touch-btn wide' id='touchReset'>RESET</button></div></div><script>retroHeader('FROG DASH');const c=document.getElementById('game'),g=c.getContext('2d');let frog,cars,score,alive,running,paused,lastSpawn,lastTouch,shake,wave,safeTimer;function resetGame(){frog={x:300,y:580,w:40,h:40,hop:0,inv:30};cars=[];score=0;alive=true;running=false;paused=false;lastSpawn=0;lastTouch=null;shake=0;wave=1;safeTimer=45;RetroState.show('READY','START CROSSING','retro-ready',900)}function start(){if(!alive)resetGame();running=true;paused=false;RetroState.show('GO','CROSS','retro-ready',650)}function togglePause(){if(!running||!alive)return;paused=!paused;RetroState.show(paused?'PAUSED':'GO',paused?'PRESS START':'MOVE','',520)}function moveFrog(dir){if(!alive)return;if(!running)start();frog.hop=8;if(dir==='up')frog.y-=40;if(dir==='down')frog.y+=40;if(dir==='left')frog.x-=40;if(dir==='right')frog.x+=40;frog.x=Math.max(0,Math.min(600,frog.x));frog.y=Math.max(20,Math.min(580,frog.y))}function rectHit(a,b){const pad=7;return a.x+pad<b.x+b.w-pad&&a.x+a.w-pad>b.x+pad&&a.y+pad<b.y+b.h-pad&&a.y+a.h-pad>b.y+pad}function spawn(){const lanes=[100,160,220,280,340,400,460,520];const lane=lanes[Math.floor(Math.random()*lanes.length)];const fromLeft=Math.random()>.5;cars.push({x:fromLeft?-100:740,y:lane,w:74+Math.random()*30,h:34,v:(fromLeft?1:-1)*(2.6+Math.random()*2.8+wave*.18),c:['#ff2bd6','#00ffcc','#ffe66d','#7cff6b'][Math.floor(Math.random()*4)]})}function splat(){alive=false;running=false;shake=18;retroWin(Math.floor(score*4),score*8,0,'frog');RetroState.show('SPLAT','RESET FROG','danger',1500)}function update(t){if(!running||paused||!alive)return;if(frog.inv>0)frog.inv--;if(frog.hop>0)frog.hop--;if(t-lastSpawn>Math.max(300,620-wave*28)){spawn();lastSpawn=t}cars.forEach(ca=>ca.x+=ca.v);cars=cars.filter(ca=>ca.x>-150&&ca.x<790);if(frog.inv<=0&&cars.some(ca=>rectHit(frog,ca)))splat();if(alive&&frog.y<=30){score++;wave=Math.floor(score/3)+1;frog.x=300;frog.y=580;frog.inv=35;retroWin(12+wave,20+wave*3,2,'frog');RetroState.show('CLEAR','CROSSING '+score,'bigwin',850)}}function draw(t){let ox=0,oy=0;if(shake>0){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake;shake*=.84}g.save();g.translate(ox,oy);g.fillStyle='#102010';g.fillRect(0,0,640,640);g.fillStyle='#1b2230';g.fillRect(0,70,640,500);g.fillStyle='rgba(255,255,255,.10)';for(let y=100;y<560;y+=60)g.fillRect(0,y,640,2);g.fillStyle='rgba(124,255,107,.20)';g.fillRect(0,0,640,70);g.fillRect(0,570,640,70);cars.forEach(ca=>{g.fillStyle=ca.c;g.shadowBlur=10;g.shadowColor=ca.c;g.fillRect(ca.x,ca.y,ca.w,ca.h);g.shadowBlur=0;g.fillStyle='rgba(0,0,0,.28)';g.fillRect(ca.x+8,ca.y+7,ca.w-16,8)});g.globalAlpha=frog.inv>0?.55:1;g.fillStyle='#7cff6b';g.shadowBlur=18;g.shadowColor='#7cff6b';g.fillRect(frog.x,frog.y-frog.hop,frog.w,frog.h);g.shadowBlur=0;g.globalAlpha=1;g.fillStyle='#050507';g.fillRect(frog.x+8,frog.y+9-frog.hop,6,6);g.fillRect(frog.x+26,frog.y+9-frog.hop,6,6);g.fillStyle='#ffe66d';g.font='bold 22px Arial';g.fillText('CROSSINGS '+score,20,32);g.fillText('WAVE '+wave,520,32);if(!running&&alive){g.font='bold 40px Arial';g.fillText('PRESS START',185,330)}if(paused){g.fillStyle='rgba(0,0,0,.56)';g.fillRect(0,0,640,640);g.fillStyle='#ffe66d';g.font='bold 52px Arial';g.fillText('PAUSED',218,330)}if(!alive){g.fillStyle='rgba(0,0,0,.58)';g.fillRect(0,0,640,640);g.fillStyle='#ff2bd6';g.font='bold 54px Arial';g.fillText('SPLAT',245,330)}g.restore();requestAnimationFrame(loop)}function loop(t){update(t||0);draw(t||0)}document.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('pointerdown',()=>moveFrog(b.dataset.move)));hopBtn.onclick=()=>moveFrog('up');startBtn.onclick=touchStart.onclick=start;pauseBtn.onclick=touchPause.onclick=togglePause;resetBtn.onclick=touchReset.onclick=resetGame;document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w')moveFrog('up');if(e.key==='ArrowDown'||e.key==='s')moveFrog('down');if(e.key==='ArrowLeft'||e.key==='a')moveFrog('left');if(e.key==='ArrowRight'||e.key==='d')moveFrog('right');if(e.key===' '||e.key==='Enter')start();if(e.key==='p')togglePause();if(e.key==='r')resetGame()});c.addEventListener('pointerdown',e=>{lastTouch={x:e.clientX,y:e.clientY};if(!running&&alive)start()});c.addEventListener('pointerup',e=>{if(!lastTouch)return;const dx=e.clientX-lastTouch.x,dy=e.clientY-lastTouch.y;if(Math.abs(dx)>Math.abs(dy))moveFrog(dx>0?'right':'left');else moveFrog(dy>0?'down':'up');lastTouch=null});resetGame();requestAnimationFrame(loop);</script></body></html>
