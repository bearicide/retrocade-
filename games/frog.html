<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Frog Dash - Retrocade</title><link rel='stylesheet' href='../css/arcade.css'><script src='../js/arcade.js'></script></head><body><div class='scan'></div><div class='game-wrap'><canvas id='game' class='screen' width='640' height='640'></canvas><p class='note'>Cross the road. Fear the rectangles.</p></div><script>retroHeader('FROG DASH');const c=document.getElementById('game'),g=c.getContext('2d');let frog={x:300,y:580},cars=[];document.addEventListener('keydown',e=>{if(e.key==='ArrowUp')frog.y-=40;if(e.key==='ArrowDown')frog.y+=40;if(e.key==='ArrowLeft')frog.x-=40;if(e.key==='ArrowRight')frog.x+=40});setInterval(()=>cars.push({x:-80,y:80+Math.random()*420,v:4+Math.random()*6}),700);function loop(){g.fillStyle='#102010';g.fillRect(0,0,640,640);g.fillStyle='#555';g.fillRect(0,60,640,500);g.fillStyle='#7cff6b';g.fillRect(frog.x,frog.y,40,40);cars.forEach(ca=>{ca.x+=ca.v;g.fillStyle='#ff2bd6';g.fillRect(ca.x,ca.y,80,40)});cars=cars.filter(ca=>ca.x<700);if(cars.some(ca=>Math.abs(ca.x-frog.x)<50&&Math.abs(ca.y-frog.y)<30)){alert('ROADKILL')}if(frog.y<20){retroWin(25,40,3);frog.y=580}requestAnimationFrame(loop)}loop();</script></body></html>
